            cancelPendingRequest();
            clearRetryTimeout();
            loadAndPlaySong(targetIndex, 0);
        }

        /**
         * 播放随机队列中的下一首歌曲
         */
        function playNextRandomSong() {
            if (randomQueue.length === 0) return;
            if (isLoading) return;

            randomIndex = (randomIndex + 1) % randomQueue.length;
            cancelPendingRequest();
            clearRetryTimeout();
            loadAndPlaySong(randomIndex, 0);
        }

        /**
         * 禁用所有控制按钮
         */
        function disableButtons() {
            zuo.classList.add('btn-disabled');
            you.classList.add('btn-disabled');
            bofang.classList.add('btn-disabled');
        }

        /**
         * 启用所有控制按钮
         */
        function enableButtons() {
            zuo.classList.remove('btn-disabled');
            you.classList.remove('btn-disabled');
            bofang.classList.remove('btn-disabled');
        }

        /**
         * 显示歌曲加载提示
         */
        function showLoading提示(text = "加载中...") {
            loading提示.textContent = text;
            loading提示.classList.add('show');
            
            // 设置超时自动隐藏（防止加载提示一直显示）
            if (loading提示._hideTimeout) {
                clearTimeout(loading提示._hideTimeout);
            }
            loading提示._hideTimeout = setTimeout(() => {
                hideLoading提示();
                console.log('加载提示超时自动隐藏');
            }, 35000); // 35秒超时（比API超时多5秒）
        }

        /**
         * 隐藏歌曲加载提示
         */
        function hideLoading提示() {
            loading提示.classList.remove('show');
            
            // 清除超时定时器
            if (loading提示._hideTimeout) {
                clearTimeout(loading提示._hideTimeout);
                loading提示._hideTimeout = null;
            }
        }

        /**
         * 取消当前的请求
         */
        function cancelPendingRequest() {
            if (cancelTokenSource) {
                cancelTokenSource.cancel('请求已取消');
                cancelTokenSource = null;
            }
        }

        /**
         * 清除重试定时器
         */
        function clearRetryTimeout() {
            if (retryTimeout) {
                clearTimeout(retryTimeout);
                retryTimeout = null;
            }
        }

        /**
         * 计算指数退避延迟时间
         */
        function calculateBackoffDelay(retryCount) {
            return 500 * Math.pow(retryCount + 1, 2);
        }

        /**
         * 使用本地缓存数据播放歌曲
         */
        function playWithCachedData(songId, cachedData, targetIndex, seekTime) {
            isLoading = true;
            disableButtons();

            currentCoverImage = cachedData.pic || defaultCover;
            songTitle.textContent = cachedData.name;
            songArtist.textContent = cachedData.artist;

            // 解析时长格式 (mm:ss) 为毫秒
            const durationParts = cachedData.duration.split(':');
            const minutes = parseInt(durationParts[0], 10);
            const seconds = parseInt(durationParts[1], 10);
            totalDuration = (minutes * 60 + seconds) * 1000;
            totalTimeDisplay.textContent = cachedData.duration;

            // 更新封面图
            if (isInitialized) {
                switchAlbumImage(currentCoverImage);
            } else {
                img1.src = currentCoverImage;
                img2.src = currentCoverImage;
            }

            // 更新媒体会话元数据
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: cachedData.name,
                    artist: cachedData.artist,
                    album: cachedData.album || "",
                    artwork: [
                        { src: currentCoverImage, sizes: '96x96', type: 'image/jpeg' },
                        { src: currentCoverImage, sizes: '256x256', type: 'image/jpeg' }
                    ]
                });
            }

            // 通知原生端歌曲信息变化
            notifyNativeSongInfo();

            // 关键修复：切歌后强制同步系统进度条，确保不会停留在上一首歌的进度
            forceSyncMediaSession();
            
            if (USE_NATIVE_PLAYER && window.AndroidBridge && typeof window.AndroidBridge.nativeLoadAndPlay === 'function') {
                player.pause();
                player.src = '';
                const result = nativeLoadAndPlay(cachedData.url, seekTime * 1000);
                if (result) {
                    // 根据播放模式更新当前索引
                    if (playMode === PlayMode.RANDOM) {
                        randomIndex = targetIndex;
                    } else {
                        currentIndex = targetIndex;
                    }
                    
                    // 关键修复：原生播放器模式下，等待回调通知准备完成
                    // 不立即设置 isLoading = false，让 onNativePlayerPrepared 回调处理
                    // 只更新UI相关的状态
                    
                    if (lyricsEnabled) {
                        loadLyrics(songId);
                    }
                    
                    updatePlaylistCurrentInfo();
                    renderPlaylist();
                    return;
                }
                // 如果原生播放器失败，回退到Web Audio
                console.warn("原生播放器播放失败，回退到Web Audio");
            }
            
            // 使用Web Audio播放（原生播放器不可用或失败时）
            player.src = cachedData.url;

            // 等待音频可以播放
            const handleCanPlay = () => {
                player.removeEventListener('canplay', handleCanPlay);
                player.removeEventListener('error', handleError);

                // 根据播放模式更新当前索引
                if (playMode === PlayMode.RANDOM) {
                    randomIndex = targetIndex;
                } else {
                    currentIndex = targetIndex;
                }

                // 设置播放位置（如果有）
                if (seekTime > 0) {
                    player.currentTime = seekTime;
                    currentProgress = Math.floor(seekTime * 1000);
                    forceSyncMediaSession();
                }

                player.play().then(() => {
                    isLoading = false;
                    syncIndicator.className = "sync-indicator";
                    startSyncInterval();
                    setTimeout(forceSyncMediaSession, 300);

                    if (seekTime > 0) {
                        setTimeout(() => {
                            player.currentTime = seekTime;
                            forceSyncMediaSession();
                        }, 100);
                    }
                });

                isInitialized = true;
                enableButtons();
                hideLoading提示();

                if (lyricsEnabled) {
                    loadLyrics(songId);
                }

                updatePlaylistCurrentInfo();
                renderPlaylist();
                forceSyncMediaSession();
            };

            const handleError = () => {
                player.removeEventListener('canplay', handleCanPlay);
                player.removeEventListener('error', handleError);
                console.log('缓存的歌曲URL失效，重新从API加载');
                isLoading = false;
                // 删除过期缓存，重新从API加载（retryCount=1 跳过缓存检查）
                localStorage.removeItem(CACHE_CONFIG.SONG_CACHE_PREFIX + songId);
                loadAndPlaySong(targetIndex, 1, seekTime);
            };

            player.addEventListener('canplay', handleCanPlay);
            player.addEventListener('error', handleError);
            player.load();

            // 设置10秒超时，防止一直等待
            setTimeout(() => {
                player.removeEventListener('canplay', handleCanPlay);
                player.removeEventListener('error', handleError);
                if (isLoading) {
                    console.log('缓存歌曲加载超时，重新从API加载');
                    isLoading = false;
                    localStorage.removeItem(CACHE_CONFIG.SONG_CACHE_PREFIX + songId);
                    loadAndPlaySong(targetIndex, 1, seekTime);
                }
            }, 10000);
        }

        /**
         * 核心加载和播放歌曲函数
         */
        function loadAndPlaySong(targetIndex, retryCount, seekTime = 0) {
            // 记录加载开始时的进度状态
            loadingStartProgress = currentProgress;
            loadingStartTime = Date.now();

            isLoading = true;
            disableButtons();

            // 加载期间特殊处理：冻结进度条
            syncIndicator.className = "sync-indicator paused";

            lyrics = [];
            currentLyricIndex = -1;
            clearLyricLines();
            hideLyricLoading(); // 隐藏歌词加载提示

            // 统一显示加载提示，不区分首次加载和重试
            showLoading提示("加载歌曲中...");
            
            // 更新通知栏状态为加载中
            updateNotificationStatus("loading", "歌曲正在加载", "");

            // 根据播放模式获取目标歌曲ID
            const targetSongId = playMode === PlayMode.RANDOM
                ? randomQueue[targetIndex]
                : songIds[targetIndex];

            // 检查歌曲ID是否有效
            if (!targetSongId) {
                console.error('无效的歌曲ID，播放列表可能为空');
                showLoading提示('播放列表为空，请先添加歌曲');
                isLoading = false;
                enableButtons();
                setTimeout(hideLoading提示, 2000);
                return;
            }

            // 记录当前要播放的歌曲ID
            currentPlayingSongId = targetSongId;

            // 先检查本地存储的歌曲缓存（3小时有效期）
            const cachedSongData = getSongCacheFromStorage(targetSongId);
            
            if (cachedSongData && retryCount === 0) {
                playWithCachedData(targetSongId, cachedSongData, targetIndex, seekTime);
                return;
            }
            
            // 如果缓存过期但标记了需要刷新，尝试重新获取
            const refreshKey = CACHE_CONFIG.SONG_CACHE_PREFIX + 'refresh_' + targetSongId;
            const needsRefresh = localStorage.getItem(refreshKey);
            if (needsRefresh && retryCount === 0 && isOnline) {
                // 清除刷新标记，避免重复刷新
                localStorage.removeItem(refreshKey);
            }

            cancelPendingRequest();
            cancelTokenSource = axios.CancelToken.source();

            // 获取当前歌曲名称，用于落月API搜索模式
            const currentSongInfo = playlistData.find(s => s.id === targetSongId);
            const songName = currentSongInfo ? currentSongInfo.name : '';
            
            // 使用getApiUrl动态获取当前API的URL
            const apiUrl = getApiUrl(targetSongId, 'exhigh', songName);
            
            if (!apiUrl) {
                isLoading = false;
                enableButtons();
                hideLoading提示();
                playNextSong();
                return;
            }
            

            // 关键修复：优先使用原生异步接口获取歌曲详情，绕过 WebView CORS 限制
            // 注意：targetSongId 必须转字符串，避免大数字被转成科学计数法 (如 2.69085e+09)
            let apiPromise;
            if (window.AndroidBridge && typeof window.AndroidBridge.nativeGetSongDetailAsync === 'function') {
                const stringifiedId = String(targetSongId);
                
                // 使用原生异步接口，返回一个 Promise
                apiPromise = new Promise((resolve, reject) => {
                    const callbackName = '_playCallback_' + Date.now();
                    window[callbackName] = function(resultJson) {
                        try {
                            const data = JSON.parse(resultJson);
                            
                            if (data && data.code === 200 && data.data) {
                                if (data.data.url) {
                                }
                                resolve({ data: data });
                            } else {
                                reject(new Error(`原生接口返回无效数据: code=${data.code}`));
                            }
                        } catch (e) {
                            reject(e);
                        } finally {
                            delete window[callbackName];
                        }
                    };
                    window.AndroidBridge.nativeGetSongDetailAsync(stringifiedId, callbackName);
                });
            } else {
                // 降级到 axios（用于 PC 浏览器调试）
                if (window.AndroidBridge) {
                }
                apiPromise = axios.get(apiUrl, {
                    cancelToken: cancelTokenSource.token,
                    timeout: 10000 // 10秒超时
                });
            }

            // 使用API获取歌曲信息
            apiPromise
                .then(res => {
                    const responseData = res.data || res;
                    
                    if (responseData.data) {
                        if (responseData.data.url) {
                        }
                    }
                    
                    if (responseData.code === 200 && responseData.data) {
                        // 检测版权错误：如果url包含特定错误信息，标记为无版权歌曲
                        const songUrl = responseData.data.url || '';
                        const isNoCopyright = songUrl.includes('获取歌曲地址失败，可能是会员到期了');
                        
                        
                        if (isNoCopyright) {
                            
                            // 标记歌曲为无版权
                            markSongAsNoCopyright(targetSongId);
                            
                            // 自动跳过无版权歌曲，不进行重试
                            isLoading = false;
                            enableButtons();
                            hideLoading提示();
                            
                            // 显示提示并自动播放下一首
                            showToast('该歌曲无版权，自动跳过', 'warning', 2000);
                            setTimeout(() => {
                                playNextSong();
                            }, 500);
                            
                            return Promise.reject(new Error('无版权歌曲'));
                        }
                        
                        
                        currentCoverImage = responseData.data.pic || defaultCover;

                        // 获取音频URL
                        const audioUrl = responseData.data.url;

                        // 检查是否有预加载缓存
                        const cachedSong = preloadCache.get(targetSongId);
                        const finalUrl = (cachedSong && Date.now() - cachedSong.timestamp < CACHE_EXPIRE_TIME) 
                            ? cachedSong.url 
                            : audioUrl;

                        // 更新UI
                        songTitle.textContent = responseData.data.name;
                        songArtist.textContent = responseData.data.artist;

                        // 保存歌曲信息到本地缓存（3小时有效期）
                        saveSongCacheToStorage(targetSongId, {
                            url: audioUrl,
                            name: responseData.data.name,
                            artist: responseData.data.artist,
                            pic: responseData.data.pic,
                            duration: responseData.data.duration,
                            album: responseData.data.album || ""
                        });

                        // 解析时长格式 (mm:ss) 为毫秒
                        const durationParts = res.data.data.duration.split(':');
                        const minutes = parseInt(durationParts[0], 10);
                        const seconds = parseInt(durationParts[1], 10);
                        totalDuration = (minutes * 60 + seconds) * 1000;
                        totalTimeDisplay.textContent = res.data.data.duration;

                        // 更新封面图
                        if (isInitialized) {
                            switchAlbumImage(currentCoverImage);
                        } else {
                            img1.src = currentCoverImage;
                            img2.src = currentCoverImage;
                        }

                        // 更新媒体会话元数据
                        if ('mediaSession' in navigator) {
                            navigator.mediaSession.metadata = new MediaMetadata({
                                title: res.data.data.name,
                                artist: res.data.data.artist,
                                album: res.data.data.album || "",
                                artwork: [
                                    { src: currentCoverImage, sizes: '96x96', type: 'image/jpeg' },
                                    { src: currentCoverImage, sizes: '256x256', type: 'image/jpeg' }
                                ]
                            });
                        }

                        // 通知原生端歌曲信息变化
                        notifyNativeSongInfo();

                        if (USE_NATIVE_PLAYER && window.AndroidBridge && typeof window.AndroidBridge.nativeLoadAndPlay === 'function') {
                            player.pause();
                            player.src = '';
                            const nativeResult = nativeLoadAndPlay(finalUrl, seekTime * 1000);
                            
                            if (!nativeResult) {
                                // 原生播放器调用失败，回退到Web Audio
                                console.warn("原生播放器调用失败，回退到Web Audio");
                                // 继续执行下面的Web Audio逻辑（不return）
                            } else {
                                // 关键修复：立即设置标志，防止 Web Audio 部分继续执行
                                isUsingNativePlayer = true;
                                
                                // 关键修复：原生播放器模式下，Web Audio只用于UI同步，不设置src避免意外播放
                                // 设置一个空的音频源或保持当前状态
                                // 注意：不设置 player.src 以避免 Web Audio 和原生播放器同时播放
                                
                                // 根据播放模式更新当前索引
                                if (playMode === PlayMode.RANDOM) {
                                    randomIndex = targetIndex;
                                } else {
                                    currentIndex = targetIndex;
                                }
                                
                                // 注意：原生播放器通过回调通知准备完成，这里不立即设置状态
                                // onNativePlayerPrepared 回调会处理 isLoading = false 等状态
                                
                                // 更新播放列表当前播放信息
                                updatePlaylistCurrentInfo();
                                renderPlaylist();
                                
                                // 关键修复：原生播放器成功后，返回一个特殊的 Promise 来跳过 Web Audio 部分
                                return new Promise((resolve) => {
                                    resolve();
                                });
                            }
                        }
                        
                        // 使用Web Audio（原生播放器不可用或失败时）
                        {
                            // 关键修复：如果使用原生播放器，跳过 Web Audio 的 src 设置和 play 调用
                            if (!isUsingNativePlayer) {
                                // 使用Web Audio
                                player.src = finalUrl;
                                
                                // 立即设置初始位置为0，确保系统进度条正确重置
                                if (supportsMediaSessionPositionState) {
                                    navigator.mediaSession.setPositionState({
                                        duration: totalDuration / 1000,
                                        position: 0,
                                        playbackRate: 1
                                    });
                                }

                                // 重置媒体会话进度条
                                resetMediaSession();

                                // 等待音频可以播放
                                return new Promise((resolve, reject) => {
                                    const handleCanPlay = () => {
                                        player.removeEventListener('canplay', handleCanPlay);
                                        player.removeEventListener('error', handleError);
                                        resolve();
                                    };

                                    const handleError = () => {
                                        player.removeEventListener('canplay', handleCanPlay);
                                        player.removeEventListener('error', handleError);
                                        reject(new Error("音频加载失败"));
                                    };

                                    player.addEventListener('canplay', handleCanPlay);
                                    player.addEventListener('error', handleError);
                                    player.load();
                                });
                            } else {
                                // 原生播放器已处理播放，直接 resolve
                                return Promise.resolve();
                            }
                        }

                    } else {
                        throw new Error("API返回无效数据");
                    }
                })
                .then(() => {
                    // 关键修复：如果使用原生播放器，跳过 Web Audio 的 play 调用
                    if (isUsingNativePlayer) {
                        // 原生播放器已处理播放，直接设置状态
                        isLoading = false;
                        isInitialized = true;
                        enableButtons();
                        hideLoading提示();
                        
                        // 更新播放列表当前播放信息
                        updatePlaylistCurrentInfo();
                        renderPlaylist();
                        
                        // 启动同步
                        syncIndicator.className = "sync-indicator";
                        startSyncInterval();
                        
                        // 检查缓存是否即将过期（5分钟内），如果是则后台刷新
                        checkAndRefreshCache(targetSongId);
                        
                        // 如果启用了歌词，加载歌词
                        if (lyricsEnabled) {
                            loadLyrics(currentPlayingSongId);
                        }
                        
                        // 关键修复：同步系统进度条
                        forceSyncMediaSession();
                        
                        return;
                    }
                    
                    // 根据播放模式更新当前索引
                    if (playMode === PlayMode.RANDOM) {
                        randomIndex = targetIndex;
                    } else {
                        currentIndex = targetIndex;
                    }

                    // 设置播放位置（如果有）
                    if (seekTime > 0) {
                        player.currentTime = seekTime;
                        currentProgress = Math.floor(seekTime * 1000);
                        // 立即同步到系统进度条
                        forceSyncMediaSession();
                    }

                    player.play().then(() => {
                        // 播放成功后启动同步
                        isLoading = false;
                        syncIndicator.className = "sync-indicator";
                        startSyncInterval();
                        // 播放开始后再次同步
                        setTimeout(forceSyncMediaSession, 300);

                        // 新增：强制重置系统进度条到实际开始位置
                        if (seekTime > 0) {
                            setTimeout(() => {
                                player.currentTime = seekTime;
                                forceSyncMediaSession();
                            }, 100);
                        }

                        // 检查缓存是否即将过期（5分钟内），如果是则后台刷新
                        checkAndRefreshCache(targetSongId);
                    }).catch(err => {
                        // 处理自动播放策略错误
                        if (err.name === 'NotAllowedError') {
                            console.log('需要用户交互才能播放音频');
                            isLoading = false;
                            enableButtons();
                            hideLoading提示();
                            // 显示播放按钮提示用户点击
                            icons.classList.remove('fa-pause');
                            icons.classList.add('fa-play');
                        } else {
                            console.error('播放失败:', err);
                            isLoading = false;
                            enableButtons();
                            hideLoading提示();
                        }
                    });

                    isInitialized = true;
                    enableButtons();
                    hideLoading提示();

                    // 如果启用了歌词，加载歌词
                    if (lyricsEnabled) {
                        loadLyrics(currentPlayingSongId);
                    }

                    // 更新播放列表当前播放信息
                    updatePlaylistCurrentInfo();
                    renderPlaylist();

                    forceSyncMediaSession(); // 歌曲加载完成后强制同步
                })
                .catch(error => {
                    
                    if (error.response) {
                    }
                    if (error.request) {
                    }
                    
                    // 检测API服务器错误
                    let errorMessage = '加载失败，请稍后重试';
                    if (error.status === 502 || error.status === 503) {
                        errorMessage = 'API服务器正在维护中，请稍后再试';
                    } else if (error.isNetworkError) {
                        errorMessage = '网络连接失败，请检查网络';
                    } else if (error.isTimeout) {
                        errorMessage = '请求超时，服务器响应过慢';
                    } else if (error.message && error.message.includes('CORS')) {
                        errorMessage = '跨域请求被阻止';
                    } else if (error.message && error.message.includes('JSON')) {
                        errorMessage = 'API返回数据格式错误';
                    }

                    if (retryCount < MAX_RETRIES) {
                        const delay = calculateBackoffDelay(retryCount);
                        const nextRetry = retryCount + 1;

                        let countdown = Math.round(delay / 1000);
                        showLoading提示(`加载失败，${countdown}秒后重试(${nextRetry}/${MAX_RETRIES})`);

                        const updateCountdown = () => {
                            countdown--;
                            if (countdown > 0 && retryTimeout) {
                                showLoading提示(`加载失败，${countdown}秒后重试(${nextRetry}/${MAX_RETRIES})`);
                                setTimeout(updateCountdown, 1000);
                            }
                        };

                        updateCountdown();

                        clearRetryTimeout();
                        retryTimeout = setTimeout(() => {
                            loadAndPlaySong(targetIndex, nextRetry);
                        }, delay);
                    } else {
                        // 关键修复：岑鬼鬼API失败后自动切换到落月API
                        const currentApi = API_SERVERS[currentApiIndex];
                        
                        if (currentApi.name === 'cenguigui') {
                            
                            const switchResult = switchToNextApi('岑鬼鬼API请求失败');
                            
                            if (switchResult) {
                                
                                // 切换API后立即重试当前歌曲
                                clearRetryTimeout();
                                cancelPendingRequest();
                                isLoading = false;
                                setTimeout(() => {
                                    loadAndPlaySong(targetIndex, 0, seekTime);
                                }, 1000);
                                return;
                            } else {
                            }
                        } else {
                        }
                        
                        // 记录播放失败的歌曲到本地存储
                        function recordFailedSong(songId, songName, artist) {
                            try {
                                const failedSongs = JSON.parse(localStorage.getItem('failedSongs') || '[]');
                                const existingIndex = failedSongs.findIndex(song => song.id === songId);

                                if (existingIndex === -1) {
                                    failedSongs.push({
                                        id: songId,
                                        name: songName || '未知歌曲',
                                        artist: artist || '未知歌手',
                                        failedAt: new Date().toISOString()
                                    });
                                    localStorage.setItem('failedSongs', JSON.stringify(failedSongs));
                                    console.log('已记录播放失败的歌曲:', songId, songName, artist);
                                }
                            } catch (error) {
                                console.error('记录失败歌曲时出错:', error);
                            }
                        }

                        // 获取当前失败歌曲信息
                        const failedSongId = targetSongId;
                        const failedSongName = songTitle.textContent || '未知歌曲';
                        const failedArtist = songArtist.textContent || '未知歌手';
                        recordFailedSong(failedSongId, failedSongName, failedArtist);

                        showLoading提示(`已尝试${MAX_RETRIES}次均失败，正在切换到下一首...`);

                        setTimeout(() => {
                            isLoading = false;
                            syncIndicator.className = "sync-indicator";
                            clearRetryTimeout();
                            cancelPendingRequest();

                            // 切换到下一首
                            const nextIndex = playMode === PlayMode.RANDOM
                                ? (targetIndex + 1) % randomQueue.length
                                : (targetIndex + 1) % songIds.length;

                            loadAndPlaySong(nextIndex, 0);
                        }, 2000);
                    }
                });
        }

        /**
         * 初始播放函数
         */
        function playMusic() {
            // 查找sui在songIds数组中的索引
            const initialIndex = songIds.indexOf(sui);
            loadAndPlaySong(initialIndex >= 0 ? initialIndex : 0, 0); // 初始播放,如果找到了有效的索引（大于等于0），就从该索引开始播放；否则默认从第一首（索引0）开始播放
        }

        /**
         * 查看并导出播放失败的歌曲列表
         * 可以通过在浏览器控制台输入: showFailedSongs() 来查看
         * 输入: exportFailedSongs() 来导出为文件
         */
        function showFailedSongs() {
            try {
                const failedSongs = JSON.parse(localStorage.getItem('failedSongs') || '[]');
                console.log('播放失败的歌曲列表 (共', failedSongs.length, '首):');
                failedSongs.forEach((song, index) => {
                    console.log(`${index + 1}. [${song.id}] ${song.name} - ${song.artist} (失败时间: ${song.failedAt})`);
                });
                return failedSongs;
            } catch (error) {
                console.error('查看失败歌曲列表时出错:', error);
                return [];
            }
        }

        function exportFailedSongs() {
            try {
                const failedSongs = JSON.parse(localStorage.getItem('failedSongs') || '[]');
                if (failedSongs.length === 0) {
                    console.log('没有播放失败的歌曲记录');
                    return;
                }

                // 转换为CSV格式
                const csvContent = [
                    ['歌曲ID', '歌曲名称', '歌手', '失败时间'].join(','),
                    ...failedSongs.map(song => [
                        song.id,
                        `"${song.name}"`,
                        `"${song.artist}"`,
                        song.failedAt
                    ].join(','))
                ].join('\n');

                // 创建并下载文件
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `failed_songs_${new Date().toISOString().split('T')[0]}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                console.log('已导出', failedSongs.length, '首播放失败的歌曲到CSV文件');
            } catch (error) {
                console.error('导出失败歌曲列表时出错:', error);
            }
        }

        // 暴露这两个函数到全局，方便在控制台调用
        window.showFailedSongs = showFailedSongs;
        window.exportFailedSongs = exportFailedSongs;

        /**
         * 鼠标点击进度条时跳转播放位置（使用 EventListenerManager 管理）
         */
        EventListenerManager.add(progressContainer, 'click', (e) => {
            if (totalDuration > 0 && !isLoading && isOnline) {
                syncIndicator.classList.add('syncing');

                const rect = progressContainer.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                const newPositionMs = Math.floor(percent * totalDuration);

                // 关键修复：先更新currentProgress
                currentProgress = newPositionMs;

                // 使用原生播放器跳转
                if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                    nativeSeekTo(newPositionMs);
                    // 关键修复：原生播放器模式下不修改Web Audio的currentTime
                    // 避免两个播放器状态不一致
                } else {
                    // 使用Web Audio跳转
                    player.currentTime = newPositionMs / 1000;
                }

                updateProgress();
                forceSyncMediaSession(newPositionMs / 1000); // 立即同步

                if (lyricsEnabled) updateLyricsDisplay();
                else lastKnownTime = currentProgress;

                setTimeout(() => {
                    syncIndicator.classList.remove('syncing');
                }, 300);
            }
        });

        /**
         * 更新进度条和时间显示
         */
        function updateProgress() {
            if (totalDuration > 0) {
                let currentTime;

                // 关键修复：使用原生播放器的进度（如果可用）
                if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                    // 从原生播放器获取进度（currentProgress由原生播放器回调更新，单位是毫秒）
                    currentTime = currentProgress / 1000;
                    
                    // 关键修复：只在Web Audio有有效src时同步时间
                    try {
                        if (player.src && player.src !== '' && Math.abs(player.currentTime - currentTime) > 1) {
                            player.currentTime = currentTime;
                        }
                    } catch (e) {
                        // 忽略同步错误
                    }
                } else {
                    // 使用Web Audio的进度
                    if (player.paused || !isPlaying) {
                        currentTime = currentProgress / 1000;
                    } else {
                        currentTime = player.currentTime;
                        currentProgress = Math.floor(currentTime * 1000);
                    }
                }

                const percent = Math.min(100, (currentTime / (totalDuration / 1000)) * 100);
                progressBar.style.width = `${percent}%`;

                currentTimeDisplay.textContent = formatTime(currentTime);
            }
        }

        /**
         * 格式化时间（秒 -> mm:ss）
         */
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        /**
         * 切换专辑封面（淡入淡出效果）
         */
        function switchAlbumImage(newSrc) {
            if (isSwitching) return;
            isSwitching = true;

            const tempImg = new Image();
            tempImg.src = newSrc;

            tempImg.onload = function () {
                inactiveImage.src = newSrc;
                inactiveImage.style.opacity = '1';
                activeImage.style.opacity = '0';

                setTimeout(() => {
                    const temp = activeImage;
                    activeImage = inactiveImage;
                    inactiveImage = temp;
                    isSwitching = false;
                }, 800);
            };

            tempImg.onerror = function () {
                inactiveImage.src = defaultCover;
                inactiveImage.style.opacity = '1';
                activeImage.style.opacity = '0';

                setTimeout(() => {
                    const temp = activeImage;
                    activeImage = inactiveImage;
                    inactiveImage = temp;
                    isSwitching = false;
                }, 800);
            };
        }

        /**
         * 音频开始播放时的处理
         */
        player.addEventListener('play', () => {
            isPlaying = true;

            canvas.style.opacity = '1';
            canvas.style.animationPlayState = 'running';

            // 更新媒体会话播放状态并同步进度
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = "playing";
                
                // 立即强制同步一次进度，确保系统进度条与应用内进度条一致
                setTimeout(() => {
                    forceSyncMediaSession();
                }, 100);
                
                // 持续同步，确保进度始终一致
                const initialSyncInterval = setInterval(() => {
                    if (isPlaying && !isLoading) {
                        forceSyncMediaSession();
                    } else {
                        clearInterval(initialSyncInterval);
                    }
                }, 500);
                
                // 5秒后停止高频同步，切换到正常同步间隔
                setTimeout(() => {
                    clearInterval(initialSyncInterval);
                }, 5000);
            }

            // 启动同步定时器
            startSyncInterval();

            // 更新UI
            infoPanel.style.opacity = 1;
            infoPanel.style.transform = 'translateY(0px)';
            infoPanel.style.pointerEvents = 'auto';

            img1.style.animationPlayState = "running";
            img2.style.animationPlayState = "running";

            icons.classList.remove('fa-play');
            icons.classList.add('fa-pause');

            // 启动进度更新定时器，提高频率至100ms
            clearInterval(progressUpdateInterval);
            progressUpdateInterval = setInterval(updateProgress, 100);

            // 重置后台播放尝试次数
            backgroundPlayAttempts = 0;

            // 移动端：播放开始后自动隐藏控件
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                startHideTimer();
            }
        });

        /**
         * 音频暂停时的处理
         */
        player.addEventListener('pause', () => {
            isPlaying = false;

            canvas.style.opacity = '0';
            canvas.style.animationPlayState = 'paused';

            // 更新媒体会话暂停状态并同步进度
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = "paused";
                forceSyncMediaSession(); // 暂停时强制同步
            }

            // 暂停时停止同步定时器
            stopSyncInterval();

            // 更新UI
            infoPanel.style.opacity = 0;
            infoPanel.style.transform = 'translateY(50px)';
            infoPanel.style.pointerEvents = 'none';

            img1.style.animationPlayState = 'paused';
            img2.style.animationPlayState = 'paused';

            icons.classList.remove('fa-pause');
            icons.classList.add('fa-play');

            // 清除进度更新定时器
            clearInterval(progressUpdateInterval);

            // 移动端：暂停时显示控件，清除隐藏计时器
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                showControls();
                if (controlHideTimer) {
                    clearTimeout(controlHideTimer);
                    controlHideTimer = null;
                }
            }
        });

        /**
         * 初始化背景动画画布
         */
        function initCanvas() {
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, 'rgba(237, 94, 94, 0.2)');
                gradient.addColorStop(0.2, 'rgba(237, 237, 94, 0.2)');
                gradient.addColorStop(0.4, 'rgba(94, 237, 94, 0.2)');
                gradient.addColorStop(0.6, 'rgba(94, 237, 237, 0.2)');
                gradient.addColorStop(0.8, 'rgba(52, 164, 255, 0.2)');
                gradient.addColorStop(1, 'rgba(144, 60, 255, 0.2)');

                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const time = Date.now() * 0.001;
                const particleCount = 50; // 粒子数量

                for (let i = 0; i < particleCount; i++) {
                    const x = (Math.sin(time * 0.2 + i) * 0.5 + 0.5) * canvas.width;
                    const y = (Math.cos(time * 0.3 + i) * 0.5 + 0.5) * canvas.height;
                    const size = Math.sin(time + i) * 5 + 10;

                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${0.1 + Math.sin(time + i) * 0.05})`;
                    ctx.fill();
                }

                requestAnimationFrame(draw);
            }

            draw();

            // 窗口大小变化时重新设置画布大小
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

    </script>
