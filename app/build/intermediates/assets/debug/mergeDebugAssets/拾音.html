                                }
                            } else {
                                player.src = cachedData.url;
                                player.load();
                            }
                        }
                    }
                }
            ];
            
            // 按顺序尝试恢复策略
            let currentStrategy = 0;
            
            const tryNextStrategy = () => {
                if (currentStrategy < recoveryStrategies.length) {
                    console.log(`尝试策略 ${currentStrategy + 1}`);
                    
                    const strategy = recoveryStrategies[currentStrategy];
                    const result = strategy();
                    
                    if (result && typeof result.then === 'function') {
                        // 异步策略
                        result.then(() => {
                            setTimeout(() => {
                                player.play().then(() => {
                                    console.log('策略成功');
                                }).catch(() => {
                                    currentStrategy++;
                                    tryNextStrategy();
                                });
                            }, 1000);
                        });
                    } else {
                        // 同步策略
                        setTimeout(() => {
                            player.play().then(() => {
                                console.log('策略成功');
                            }).catch(() => {
                                currentStrategy++;
                                tryNextStrategy();
                            });
                        }, 1000);
                    }
                } else {
                    console.log('所有恢复策略都失败，播放下一首');
                    playNextSong();
                }
            };
            
            tryNextStrategy();

            if (isPlaying !== playing && timeSinceLastChange < MIN_STATE_CHANGE_INTERVAL_MS) {

        /**
         * 处理原生层发送的控制命令
         * 用于响应系统通知栏/锁屏的播放控制
         * @param {string} command 命令：play, pause, toggle, previous, next, stop, seek:position
         */
        // 防抖变量：记录上次命令处理时间
        let lastNativeCommandTime = 0;
        const MIN_COMMAND_INTERVAL_MS = 300; // 300ms内不允许重复命令

        function handleNativeCommand(command) {
            const now = Date.now();
            const timeSinceLastCommand = now - lastNativeCommandTime;

            // 防抖保护：如果距离上次命令处理不足300ms，忽略此次命令
            if (timeSinceLastCommand < MIN_COMMAND_INTERVAL_MS) {
                console.warn(`[命令防抖] 忽略命令: ${command}, 距上次仅 ${timeSinceLastCommand}ms`);
                return;
            }
            lastNativeCommandTime = now;

            console.log("收到原生命令:", command);
            
            // 处理 seek 命令 (格式: seek:position)
            if (command.startsWith('seek:')) {
                const position = parseInt(command.substring(5));
                if (!isNaN(position) && !isLoading) {
                    handleSeekCommand(position);
                }
                return;
            }
            
            switch(command) {
                case 'play':
                    // 关键修复：直接从原生层控制，避免和 handlePlayPause() 重复调用
                    if (!isLoading) {
                        if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                            if (!isPlaying) {
                                nativeResume();
                            }
                        }
                    }
                    break;
                case 'pause':
                    // 关键修复：直接从原生层控制，避免和 handlePlayPause() 重复调用
                    if (!isLoading) {
                        if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                            if (isPlaying) {
                                nativePause();
                            }
                        }
                    }
                    break;
                case 'toggle':
                    if (!isLoading && isOnline) {
                        handlePlayPause();
                    }
                    break;
                case 'previous':
                    if (!isLoading) {
                        playPreviousSong();
                    }
                    break;
                case 'next':
                    if (!isLoading) {
                        playNextSong();
                    }
                    break;
                case 'stop':
                    // 停止播放
                    if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                        nativePause();
                    } else {
                        player.pause();
                    }
                    isPlaying = false;
                    updatePlayButtonUI();
                    stopSyncInterval();
                    
                    // 重置媒体会话
                    if ('mediaSession' in navigator) {
                        navigator.mediaSession.playbackState = "paused";
                    }
                    forceSyncMediaSession();
                    break;
                default:
                    console.log("未知的原生命令:", command);
            }
        }
        
        /**

         * @param {number} positionMs 目标位置（毫秒）

        function handleSeekCommand(positionMs) {
            console.log("处理跳转命令:", positionMs);
            
            if (isLoading || totalDuration === 0) return;
            
            // 确保位置在有效范围内
            const clampedPosition = Math.max(0, Math.min(positionMs, totalDuration));
            
            // 根据播放器类型执行跳转
            if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                nativeSeekTo(clampedPosition);
            } else {
                player.currentTime = clampedPosition / 1000;
            }
            
            // 更新当前进度
            currentProgress = clampedPosition;
            updateProgress();
            
            // 同步系统进度条
            forceSyncMediaSession(clampedPosition / 1000);
            
            // 更新歌词显示
            if (lyricsEnabled) {
                updateLyricsDisplay();
            }

        /**

         */
        function updatePlayButtonUI() {
            if (isPlaying) {
                icons.classList.remove('fa-play');
                icons.classList.add('fa-pause');
                img1.style.animationPlayState = "running";
                img2.style.animationPlayState = "running";
                canvas.style.opacity = '1';
                canvas.style.animationPlayState = 'running';
                infoPanel.style.opacity = 1;
                infoPanel.style.transform = 'translateY(0px)';
                infoPanel.style.pointerEvents = 'auto';
            } else {
                icons.classList.remove('fa-pause');
                icons.classList.add('fa-play');
                img1.style.animationPlayState = 'paused';
                img2.style.animationPlayState = 'paused';
                canvas.style.opacity = '0';
                canvas.style.animationPlayState = 'paused';
                infoPanel.style.opacity = 0;
                infoPanel.style.transform = 'translateY(50px)';
                infoPanel.style.pointerEvents = 'none';
            }
        }

        /**
         * 强制同步媒体会话进度
         * @param {number|null} position 指定位置（秒），null则使用当前进度
         */
        function forceSyncMediaSession(position = null) {
            // 关键修改：移除 isLoading 限制，确保拖动时也能同步
            if (!('mediaSession' in navigator)) return;

            try {
                // 关键修复：根据播放器类型选择正确的进度源
                let safeCurrentTime;
                if (position !== null) {
                    // 如果提供了位置参数（如拖动进度条时），使用提供的值
                    safeCurrentTime = position;
                } else if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                    // 原生播放器模式下使用 currentProgress（毫秒转秒）
                    safeCurrentTime = currentProgress / 1000;
                } else {
                    // Web Audio 模式下使用 player.currentTime
                    safeCurrentTime = player.currentTime;
                }
                
                const safeDuration = totalDuration / 1000;
                const safePlaybackRate = Math.max(0.1, player.playbackRate || 1);

                // 确保数值有效
                if (isNaN(safeCurrentTime) || isNaN(safeDuration) || safeDuration <= 0) return;

                // 确保position不大于duration
                const clampedPosition = Math.min(safeCurrentTime, safeDuration);

                // 1. 调用 Web MediaSession API
                navigator.mediaSession.setPositionState({
                    duration: safeDuration,
                    position: clampedPosition,
                    playbackRate: safePlaybackRate
                });

                navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
                lastSyncedTime = Date.now();
                syncErrorCount = 0;
                syncIndicator.className = "sync-indicator";

                // 2. 调用原生 Android Bridge，确保原生进度条同步
                if (window.AndroidBridge && typeof window.AndroidBridge.onProgressChanged === 'function') {
                    const currentTimeMs = Math.floor(clampedPosition * 1000);
                    const totalDurationMs = Math.floor(safeDuration * 1000);
                    window.AndroidBridge.onProgressChanged(currentTimeMs, totalDurationMs);
                    console.log("已调用原生进度同步:", currentTimeMs, totalDurationMs);
                }

            } catch (error) {
                console.error("媒体会话同步失败:", error);
                syncErrorCount++;
                syncIndicator.className = syncErrorCount >= MAX_SYNC_ERRORS
                    ? "sync-indicator error"
                    : "sync-indicator syncing";
            }
        }

        /**
         * 重置媒体会话进度
         */
        function resetMediaSession() {
            if (!('mediaSession' in navigator)) return;

            try {
                // 完全重置 MediaSession 状态
                navigator.mediaSession.playbackState = "none";
                
                // 清除元数据
                navigator.mediaSession.metadata = null;
                
                // 清除位置状态
                if (supportsMediaSessionPositionState) {
                    navigator.mediaSession.setPositionState({
                        duration: 0,
                        position: 0,
                        playbackRate: 1
                    });
                }
                
                console.log("MediaSession 已完全重置");
            } catch (error) {
                console.error("重置 MediaSession 失败:", error);
            }
        }

        /**
         * 更新媒体会话的位置状态
         */
        function updateMediaSessionPosition() {
            if (!('mediaSession' in navigator) || !isPlaying || isLoading) return;

            const now = Date.now();
            const timeSinceLastSync = now - lastSyncedTime;

            if (timeSinceLastSync > SYNC_INTERVAL) {
                // 关键修复：根据播放器类型选择正确的进度源
                let currentTime;
                if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                    // 原生播放器模式下使用 currentProgress
                    currentTime = currentProgress / 1000;
                } else {
                    // Web Audio 模式下使用 player.currentTime
                    currentTime = player.currentTime;
                }
                
                const safeDuration = totalDuration / 1000;

                // 确保数值有效
                if (isNaN(currentTime) || isNaN(safeDuration) || safeDuration <= 0) return;

                try {
                    // 确保position不大于duration
                    const clampedPosition = Math.min(currentTime, safeDuration);

                    navigator.mediaSession.setPositionState({
                        duration: safeDuration,
                        position: clampedPosition,
                        playbackRate: player.playbackRate || 1
                    });
                    lastSyncedTime = now;
                } catch (error) {
                    console.warn("媒体会话位置更新失败:", error);
                    syncErrorCount++;
                    if (syncErrorCount >= MAX_SYNC_ERRORS) {
                        syncIndicator.className = "sync-indicator error";
                    }
                }
            }
        }

        /**
         * 启动定期同步定时器
         */
        function startSyncInterval() {
            if (mediaSessionSyncInterval) clearInterval(mediaSessionSyncInterval);

            // 关键修改：将同步频率从2000ms提高到100ms
            mediaSessionSyncInterval = setInterval(() => {
                if (isPlaying && totalDuration > 0 && !isLoading && isOnline) {
                    const now = Date.now();

                    // 关键修复：原生播放器模式下不从player.currentTime读取进度
                    // 避免与onNativeProgressChanged回调冲突导致时间来回跳动
                    if (!USE_NATIVE_PLAYER || !nativePlayerInitialized) {
                        // Web Audio模式下使用player.currentTime
                        currentProgress = Math.floor(player.currentTime * 1000);
                        updateProgress();
                    }
                    // 原生播放器模式下，currentProgress由onNativeProgressChanged回调更新
                    // 这里只同步系统进度条
                    forceSyncMediaSession();
                } else if (isLoading && 'mediaSession' in navigator) {
                    navigator.mediaSession.setPositionState({
                        duration: totalDuration / 1000,
                        position: loadingStartProgress / 1000,
                        playbackRate: player.playbackRate || 1
                    });
                    navigator.mediaSession.playbackState = "paused";
                }
            }, SYNC_INTERVAL);
        }

        /**
         * 停止定期同步定时器
         */
        function stopSyncInterval() {
            if (mediaSessionSyncInterval) {
                clearInterval(mediaSessionSyncInterval);
                mediaSessionSyncInterval = null;
            }
        }

        /**
         * 切换歌词显示状态
         */
        function toggleLyrics() {
            lyricsEnabled = !lyricsEnabled;

            if (lyricsEnabled) {
                lyricsToggle.classList.add('active');
                lyricsContainer.classList.add('show');

                // 关键修复：始终加载当前播放歌曲的歌词
                loadLyricsForCurrentSong();
            } else {
                lastKnownTime = currentProgress;
                lyricsToggle.classList.remove('active');
                lyricsContainer.classList.remove('show');
            }
        }

        /**
         * 为当前播放歌曲加载歌词
         */
        function loadLyricsForCurrentSong() {
            if (!isInitialized) return;

            // 只有当歌词未加载或与当前播放歌曲不匹配时才加载
            if (currentPlayingSongId && (!loadedLyricSongId || loadedLyricSongId !== currentPlayingSongId)) {
                lyricRetryCount = 0;
                loadLyrics(currentPlayingSongId);
            }
        }

        /**
         * 获取当前播放歌曲ID（根据播放模式）
         */
        function getCurrentSongId() {
            // 优先使用 currentPlayingSongId（可能来自搜索播放）
            if (currentPlayingSongId) {
                return currentPlayingSongId;
            }

            // 关键修复：边界检查，防止数组越界
            if (playMode === PlayMode.RANDOM) {
                if (randomQueue.length === 0) return null;
                if (randomIndex < 0 || randomIndex >= randomQueue.length) {
                    randomIndex = 0;
                }
                return randomQueue[randomIndex];
            } else {
                if (songIds.length === 0) return null;
                if (currentIndex < 0 || currentIndex >= songIds.length) {
                    currentIndex = 0;
                }
                return songIds[currentIndex];
            }
        }

        /**
         * 加载歌词
         */
        function loadLyrics(songId) {
            // 记录正在加载的歌词对应的歌曲ID
            showLyricLoading();
            cancelLyricRequest();
            lyricCancelTokenSource = axios.CancelToken.source();

            axios.get(`${ORIGINAL_LYRIC_API}?id=${songId}`, {
                cancelToken: lyricCancelTokenSource.token,
                timeout: 10000
            })
                .then(response => {
                    hideLyricLoading();
                    if (response.data && response.data.code === 200) {
                        // 检查是否为纯音乐
                        if (response.data.pureMusic) {
                            lyrics = [{ time: 0, text: "纯音乐，请欣赏", trans: "" }];
                            updateLyricsDisplay(true);
                            loadedLyricSongId = songId;
                            return; // 纯音乐不重试
                        }

                        // 检查是否有歌词
                        if (response.data.lrc && response.data.lrc.lyric) {
                            // 原歌词
                            const lrcText = response.data.lrc.lyric;
                            // 翻译/音译歌词（如果有）
                            const transText = (response.data.tlyric && response.data.tlyric.lyric) || "";

                            parseLyrics(lrcText, transText);
                            // 记录已加载歌词的歌曲ID
                            loadedLyricSongId = songId;
                        } else {
                            // 没有歌词
                            lyrics = [{ time: 0, text: "暂无歌词", trans: "" }];
                            updateLyricsDisplay(true);
                            loadedLyricSongId = songId;
                        }
                    } else {
                        // API返回错误
                        lyrics = [];
                        clearLyricLines();
                        if (lyricRetryCount < 3) {
                            retryLoadLyrics(songId);
                        } else {
                            showLyricError("无法获取歌词");
                            setTimeout(hideLyricLoading, 2000);
                        }
                    }
                })
                .catch(error => {
                    if (!axios.isCancel(error)) {
                        console.error("歌词加载失败:", error);
                        hideLyricLoading();

                        if (lyricRetryCount < 3) {
                            retryLoadLyrics(songId);
                        } else {
                            lyrics = [];
                            clearLyricLines();
                            showLyricError("歌词加载失败");
                            setTimeout(hideLyricLoading, 2000);
                        }
                    }
                });
        }

        /**
         * 显示歌词加载提示
         */
        function showLyricLoading(text = "加载歌词中...") {
            lyricLoading.textContent = text;
            lyricLoading.classList.add('show');
        }

        /**
         * 显示歌词加载错误提示
         */
        function showLyricError(text = "歌词加载失败") {
            lyricLoading.textContent = text;
            lyricLoading.classList.add('show');
        }

        /**
         * 隐藏歌词加载提示
         */
        function hideLyricLoading() {
            lyricLoading.classList.remove('show');
        }

        /**
         * 重试加载歌词
         */
        function retryLoadLyrics(songId) {
            clearLyricRetryTimeout();
            lyricRetryCount++;

            // 显示带重试次数的提示
            showLyricLoading(`加载失败，重试中(${lyricRetryCount}/3)...`);

            // 指数退避策略：1秒, 2秒, 4秒
            const delay = 1000 * Math.pow(2, lyricRetryCount - 1);
            lyricRetryTimeout = setTimeout(() => {
                loadLyrics(songId);
            }, delay);
        }

        /**
         * 取消歌词请求
         */
        function cancelLyricRequest() {
            if (lyricCancelTokenSource) {
                lyricCancelTokenSource.cancel('歌词请求已取消');
                lyricCancelTokenSource = null;
            }
        }

        /**
         * 清除歌词重试定时器
         */
        function clearLyricRetryTimeout() {
            if (lyricRetryTimeout) {
                clearTimeout(lyricRetryTimeout);
                lyricRetryTimeout = null;
            }
        }

        /**
         * 解析LRC格式歌词和翻译/音译
         */
        function parseLyrics(lrcText, transText) {
            const lyricsArray = parseLrcContent(lrcText);
            const transArray = parseLrcContent(transText);

            lyrics = [];

            // 处理歌词
            lyricsArray.forEach(lyric => {
                lyrics.push({
                    time: lyric.time * 1000, // 转换为毫秒
                    text: lyric.text,
                    trans: ""
                });
            });

            // 处理翻译/音译
            if (transArray.length > 0) {
                transArray.forEach(trans => {
                    // 匹配时间相近的歌词（毫秒级比较）
                    const matchedIndex = lyrics.findIndex(
                        lyric => Math.abs(lyric.time - trans.time * 1000) < 500 // 500ms内视为匹配
                    );

                    if (matchedIndex !== -1) {
                        lyrics[matchedIndex].trans = trans.text;
                    }
                });
            }

            // 按时间排序
            lyrics.sort((a, b) => a.time - b.time);

            // 如果启用了歌词，更新显示
            if (lyricsEnabled) {
                updateLyricsDisplay(true);
            }
        }

        /**
         * 解析LRC内容为时间-文本数组
         */
        function parseLrcContent(lrcContent) {
            const result = [];
            if (!lrcContent) return result;

            const lines = lrcContent.split('\n');
            const regex = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/; // 匹配LRC时间格式

            lines.forEach(line => {
                const match = line.match(regex);
                if (match) {
                    const minutes = parseInt(match[1], 10);
                    const seconds = parseInt(match[2], 10);
                    const milliseconds = parseInt(match[3], 10);
                    const time = minutes * 60 + seconds + milliseconds / 1000;
                    const text = match[4].trim();

                    if (text) {
                        result.push({ time, text });
                    }
                }
            });

            return result;
        }

        /**
         * 更新歌词显示 - 使用毫秒级时间比较
         */
        function updateLyricsDisplay(forceUpdate = false) {
            if (!lyricsEnabled || lyrics.length === 0) return;

            // 关键修复：根据播放器类型选择正确的进度源
            let currentTime;
            if (forceUpdate) {
                currentTime = lastKnownTime;
            } else if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                // 原生播放器模式下使用 currentProgress
                currentTime = currentProgress;
            } else {
                // Web Audio 模式下使用 player.currentTime
                currentTime = Math.floor(player.currentTime * 1000);
            }
            let newIndex = -1;

            // 找到当前应该显示的歌词（毫秒级比较）
            for (let i = 0; i < lyrics.length; i++) {
                if (lyrics[i].time > currentTime) break;
                newIndex = i;
            }

            // 如果歌词索引没有变化且不是强制更新，直接返回
            if (!forceUpdate && newIndex === currentLyricIndex) return;

            currentLyricIndex = newIndex;

            // 获取上一句、当前句和下一句歌词
            const prevItem = currentLyricIndex > 0 ? lyrics[currentLyricIndex - 1] : { text: "", trans: "" };
            const currentItem = currentLyricIndex >= 0 ? lyrics[currentLyricIndex] : { text: "", trans: "" };
            const nextItem = currentLyricIndex < lyrics.length - 1 ? lyrics[currentLyricIndex + 1] : { text: "", trans: "" };

            // 应用歌词动画
            applyLyricAnimation(
                prevItem.text, prevItem.trans,
                currentItem.text, currentItem.trans,
                nextItem.text, nextItem.trans
            );
        }

        /**
         * 应用歌词滚动动画
         */
        function applyLyricAnimation(prevText, prevTrans, currentText, currentTrans, nextText, nextTrans) {
            // 重置动画状态
            lyricLine1.style.transform = "translateY(30px)";
            lyricLine1.style.opacity = "0";
            lyricTrans1.style.opacity = "0";
            lyricTrans1.style.transform = "translateY(10px)";

            lyricLine2.style.transform = "translateY(0)";
            lyricLine2.style.opacity = "1";
            lyricTrans2.style.opacity = currentTrans ? "0.8" : "0";
            lyricTrans2.style.transform = "translateY(0)";

            lyricLine3.style.transform = "translateY(-30px)";
            lyricLine3.style.opacity = "0";
            lyricTrans3.style.opacity = "0";
            lyricTrans3.style.transform = "translateY(-10px)";

            // 触发重绘
            void lyricLine1.offsetWidth;

            // 设置歌词内容
            lyricLine1.textContent = prevText;
            lyricTrans1.textContent = prevTrans;

            lyricLine2.textContent = currentText;
            lyricTrans2.textContent = currentTrans;

            lyricLine3.textContent = nextText;
            lyricTrans3.textContent = nextTrans;

            // 应用动画
            lyricLine1.style.transform = "translateY(0)";
            lyricLine1.style.opacity = "0.6";
            if (prevTrans) {
                lyricTrans1.style.opacity = "0.6";
                lyricTrans1.style.transform = "translateY(0)";
            }

            lyricLine2.style.transform = "translateY(0)";
            lyricLine2.style.opacity = "1";
            if (currentTrans) {
                lyricTrans2.style.opacity = "0.8";
                lyricTrans2.style.transform = "translateY(0)";
            } else {
                lyricTrans2.style.opacity = "0";
            }

            lyricLine3.style.transform = "translateY(0)";
            lyricLine3.style.opacity = "0.6";
            if (nextTrans) {
                lyricTrans3.style.opacity = "0.6";
                lyricTrans3.style.transform = "translateY(0)";
            }
        }

        /**
         * 设置歌词行内容
         */
        function setLyricLines(line1, line2, line3, trans1, trans2, trans3) {
            lyricLine1.textContent = line1;
            lyricLine2.textContent = line2;
            lyricLine3.textContent = line3;

            lyricTrans1.textContent = trans1;
            lyricTrans2.textContent = trans2;
            lyricTrans3.textContent = trans3;

            lyricTrans1.style.opacity = trans1 ? "0.6" : "0";
            lyricTrans2.style.opacity = trans2 ? "0.8" : "0";
            lyricTrans3.style.opacity = trans3 ? "0.6" : "0";
        }

        /**
         * 清空歌词行
         */
        function clearLyricLines() {
            setLyricLines("", "", "", "", "", "");
        }

        /**
         * 添加触摸反馈效果
         * @param {HTMLElement} element - 要添加触摸效果的元素
         * @param {Function} callback - 点击回调函数
         */
        function addTouchFeedback(element, callback) {
            if (!element) return;

            let isTouchDevice = false;
            let touchHandled = false;

            // 触摸开始（使用 EventListenerManager 管理）
            EventListenerManager.add(element, 'touchstart', (e) => {
                isTouchDevice = true;
                touchHandled = false;
                e.stopPropagation();
                element.style.opacity = '0.8';
                element.style.transition = 'opacity 0.1s ease';
            }, { passive: true });

            // 触摸结束 - 执行回调并标记已处理（使用 EventListenerManager 管理）
            EventListenerManager.add(element, 'touchend', (e) => {
                e.stopPropagation();
                element.style.opacity = '1';
                touchHandled = true;

                // 延迟执行回调，确保视觉效果完成
                if (callback) {
                    setTimeout(() => {
                        callback(e);
                    }, 50);
                }
            }, { passive: true });

            // 触摸取消（使用 EventListenerManager 管理）
            EventListenerManager.add(element, 'touchcancel', (e) => {
                element.style.opacity = '1';
            });

            // 鼠标按下（桌面端）（使用 EventListenerManager 管理）
            EventListenerManager.add(element, 'mousedown', () => {
                element.style.opacity = '0.8';
            });

            // 鼠标松开（桌面端）- 仅在非触摸设备上执行回调（使用 EventListenerManager 管理）
            EventListenerManager.add(element, 'mouseup', () => {
                element.style.opacity = '1';
                // 如果触摸事件已处理，则不执行鼠标回调
                if (callback && !touchHandled) {
                    callback();
                }
                // 重置标记
                setTimeout(() => {
                    touchHandled = false;
                    isTouchDevice = false;
                }, 100);
            });

            // 鼠标离开（桌面端）（使用 EventListenerManager 管理）
            EventListenerManager.add(element, 'mouseleave', () => {
                element.style.opacity = '1';
            });

            // 阻止 click 事件在触摸设备上触发（使用 EventListenerManager 管理）
            EventListenerManager.add(element, 'click', (e) => {
                if (isTouchDevice || touchHandled) {
                    e.stopPropagation();
                    e.preventDefault();
                }
            });
        }

        /**
         * 为所有按钮添加触摸反馈
         */
        function addTouchFeedbackToAllButtons() {
            // 控制按钮
            addTouchFeedback(bofang, () => {

            addTouchFeedback(you, () => {

                clearLyricRetryTimeout();
                lyricRetryCount = 0;

            // 功能按钮

            addTouchFeedback(lyricsToggle, () => {

            });
            addTouchFeedback(playlistToggle, () => {

            });
            addTouchFeedback(searchToggle, () => {

            addTouchFeedback(playlistDeleteToggle, () => {

            });
        }

        /**
         * 播放/暂停按钮触摸结束处理
         */
        function handlePlayPauseTouchEnd(e) {
            e.stopPropagation();

            if (touchTimer) clearTimeout(touchTimer);
            touchTimer = setTimeout(() => {
                if (!isLoading && isOnline) handlePlayPause();
            }, TOUCH_DELAY);
        }

        /**
         * 上一首按钮触摸结束处理
         */
        function handlePreviousTouchEnd(e) {
            e.stopPropagation();

            cancelLyricRequest();
            clearLyricRetryTimeout();
            lyricRetryCount = 0;

            if (touchTimer) clearTimeout(touchTimer);
            touchTimer = setTimeout(() => {
                if (!isLoading) playPreviousSong();
            }, TOUCH_DELAY);
        }

        /**
         * 下一首按钮触摸结束处理
         */
        function handleNextTouchEnd(e) {
            e.stopPropagation();

            cancelLyricRequest();
            clearLyricRetryTimeout();
            lyricRetryCount = 0;

            if (touchTimer) clearTimeout(touchTimer);
            touchTimer = setTimeout(() => {
                if (!isLoading) playNextSong();
            }, TOUCH_DELAY);
        }

        /**
         * 播放/暂停按钮点击处理
         */
        function handlePlayPauseClick() {
            if (!isLoading && isOnline) handlePlayPause();

        /**

        function handlePreviousClick() {

        /**

        /**

                setInitialCoverImage(defaultCover);

                return;
            }
            
            const tokenSource = axios.CancelToken.source();

            axios.get(apiUrl, {
                cancelToken: tokenSource.token,
                timeout: 10000
            })
                .then(res => {
                    const parsedData = parseApiResponse(res, songId);
                    if (parsedData && parsedData.url) {
                        currentCoverImage = parsedData.pic || defaultCover;
                        setInitialCoverImage(currentCoverImage);

                        songTitle.textContent = parsedData.name || '歌曲加载中...';

                    } else {
                        setInitialCoverImage(defaultCover);
                    }
                    hideLoading提示();

                .catch(error => {
                    if (!axios.isCancel(error)) {

                        hideLoading提示();

        /**
         * 页面可见性变化事件处理 - 关键修复
         */
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 页面进入后台
                isInBackground = true;
                pauseAnimations();
                // 关键修复：后台播放时不停止同步，只降低频率
                clearInterval(progressUpdateInterval);
                // 保持MediaSession同步，确保系统进度条更新
                startSyncInterval();
                // 立即强制同步一次状态
                forceSyncMediaSession();

            } else {
                // 页面回到前台 - 这里是修复的核心
                isInBackground = false;
                resumeAnimations();

                // 1. 关键修复：根据播放器类型选择正确的进度源
                let actualPlayerTimeMs;
                if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                    // 原生播放器模式下使用 currentProgress
                    actualPlayerTimeMs = currentProgress;
                } else {
                    // Web Audio 模式下使用 player.currentTime
                    actualPlayerTimeMs = Math.floor(player.currentTime * 1000);
                }
                currentProgress = actualPlayerTimeMs;
                updateProgress(); // 立即更新UI

                // 2. 关键修复：根据播放器类型判断播放状态
                const isPlayerActuallyPlaying = USE_NATIVE_PLAYER && nativePlayerInitialized
                    ? isPlaying  // 原生播放器模式下使用 isPlaying 状态
                    : !player.paused;  // Web Audio 模式下使用 player.paused
                    
                if (isPlayerActuallyPlaying) {
                    isPlaying = true;
                    // 恢复进度条更新
                    clearInterval(progressUpdateInterval);
                    progressUpdateInterval = setInterval(updateProgress, 100);
                    // 恢复同步间隔
                    startSyncInterval();
                }

                // 3. 强制进行一次完整的媒体会话同步，覆盖所有状态
                forceSyncMediaSession();

                // 4. 更新最后真实timeupdate时间
                lastRealTimeUpdate = Date.now();

                // 5. 重置后台播放尝试次数
                backgroundPlayAttempts = 0;
            }
            lastUpdateTime = Date.now();
        });

        /**

                img1.style.animationPlayState = 'paused';
                img2.style.animationPlayState = 'paused';
                canvas.style.animationPlayState = 'paused';

        /**

        function resumeAnimations() {

                canvas.style.animationPlayState = 'running';
            }
        }

        async function loadPlaylistData() {

        /**
         * 加载缺失的歌曲（新增的歌曲）
         */
        async function loadMissingSongs(missingIds) {
            const batchSize = 5;
            for (let i = 0; i < missingIds.length; i += batchSize) {
                const batch = missingIds.slice(i, i + batchSize);
                const promises = batch.map(async (songId) => {
                    try {
                        const currentSongInfo = playlistData.find(s => s.id === songId);
                        const songName = currentSongInfo ? currentSongInfo.name : '';
                        const apiUrl = getApiUrl(songId, 'exhigh', songName);
                        
                        if (!apiUrl) {
                            console.error(`[API] 无法获取歌曲 ${songId} 的API URL`);
                            return null;
                        }
                        
                        const response = await axios.get(apiUrl, {
                            timeout: 8000
                        });
                        const parsedData = parseApiResponse(response, songId);
                        if (parsedData && parsedData.url) {
                            const index = songIds.indexOf(songId);
                            const songInfo = {
                                id: songId,
                                index: index,
                                name: parsedData.name || '未知歌曲',
                                artist: parsedData.artist || '未知歌手',
                                pic: parsedData.pic || defaultCover
                            };
                            // 添加到缓存
                            addSongToPlaylistCache(songInfo);
                            return songInfo;
                        }
                    } catch (error) {
                        console.error(`加载新增歌曲 ${songId} 失败:`, error);
                    }
                    return null;
                });

                const results = await Promise.all(promises);
                results.filter(r => r !== null).forEach(song => {
                    playlistData.push(song);
                });

                // 更新播放列表显示
                if (playlistPanel.classList.contains('show')) {
                    renderPlaylist();
                }
            }

            // 重新排序并保存到JSON
            playlistData.sort((a, b) => a.index - b.index);
            savePlaylistToJSON();
        }

        /**
         * 从API加载完整播放列表
         */
        async function loadPlaylistFromAPI() {
            playlistData = [];

            const batchSize = 5;
            for (let i = 0; i < songIds.length; i += batchSize) {
                const batch = songIds.slice(i, i + batchSize);
                const promises = batch.map(async (songId, index) => {
                    try {
                        const currentSongInfo = playlistData.find(s => s.id === songId);
                        const songName = currentSongInfo ? currentSongInfo.name : '';
                        const apiUrl = getApiUrl(songId, 'exhigh', songName);
                        
                        if (!apiUrl) {
                            console.error(`[API] 无法获取歌曲 ${songId} 的API URL`);
                            return null;
                        }
                        
                        const response = await axios.get(apiUrl, {
                            timeout: 8000
                        });
                        const parsedData = parseApiResponse(response, songId);
                        if (parsedData && parsedData.url) {
                            return {
                                id: songId,
                                index: i + index,
                                name: parsedData.name || '未知歌曲',
                                artist: parsedData.artist || '未知歌手',
                                pic: parsedData.pic || defaultCover
                            };
                        }
                    } catch (error) {
                        console.error(`加载歌曲 ${songId} 信息失败:`, error);
                    }
                    return {
                        id: songId,
                        index: i + index,
                        name: '加载失败',
                        artist: '未知歌手',
                        pic: defaultCover
                    };
                });

                const results = await Promise.all(promises);
                playlistData.push(...results);

                // 更新播放列表显示（如果已打开）
                if (playlistPanel.classList.contains('show')) {
                    renderPlaylist();
                }
            }

            // 按索引排序
            playlistData.sort((a, b) => a.index - b.index);
            isPlaylistLoaded = true;

            // 初始渲染
            renderPlaylist();

            // 如果找到了当前歌曲，更新播放列表当前歌曲信息
            const currentSongId = getCurrentSongId();
            const currentSong = playlistData.find(s => s.id === currentSongId);
            if (currentSong && playlistCurrentTitle) {
                playlistCurrentTitle.textContent = currentSong.name;
            }
        }

        /**
         * 渲染播放列表
         */
        function renderPlaylist() {
            if (playlistData.length === 0) {
                playlistContent.innerHTML = '<div style="text-align: center; padding: 60px 40px; color: rgba(255,255,255,0.5); font-size: 14px;">暂无歌曲</div>';
                return;
            }

            const currentSongId = getCurrentSongId();

            playlistContent.innerHTML = playlistData.map((song, displayIndex) => {
                const isActive = song.id === currentSongId;
                const isCurrentPlaying = song.id === currentPlayingSongId;
                const isNoCopyright = isSongNoCopyright(song.id);

                // 删除模式下显示删除按钮，否则显示序号或无版权标记
                const numberOrDelete = isDeleteMode
                    ? `<div class="playlist-item-delete" data-index="${song.index}" title="删除">
                         <i class="fa-solid fa-trash"></i>
                       </div>`
                    : `<div class="playlist-item-number ${isNoCopyright ? 'no-copyright' : ''}">
                         ${isNoCopyright ? '无版权' : (isActive ? '<i class="fa-solid fa-volume-high"></i>' : displayIndex + 1)}
                       </div>`;

                return `
                    <div class="playlist-item ${isActive ? 'active' : ''} ${isDeleteMode ? 'delete-mode' : ''} ${isNoCopyright ? 'no-copyright-item' : ''}" data-index="${song.index}" data-id="${song.id}">
                        ${numberOrDelete}
                        <div class="playlist-item-info ${isNoCopyright ? 'no-copyright-text' : ''}">
                            <div class="playlist-item-title">${escapeHtml(song.name)}</div>
                            <div class="playlist-item-artist">${escapeHtml(song.artist)}</div>
                        </div>
                    </div>
                `;
            }).join('');

            // 绑定点击和触摸事件（使用 EventListenerManager 管理）
            if (isDeleteMode) {
                // 删除模式：点击删除按钮删除歌曲
                playlistContent.querySelectorAll('.playlist-item-delete').forEach(btn => {
                    EventListenerManager.add(btn, 'click', (e) => {
                        e.stopPropagation();
                        const index = parseInt(btn.dataset.index);
                        deleteSongFromPlaylist(index);
                    });
                });

                // 删除模式下点击歌曲项不播放
                playlistContent.querySelectorAll('.playlist-item').forEach(item => {
                    item.style.cursor = 'default';
                });
            } else {
                // 正常模式：点击播放，添加触摸反馈（使用 EventListenerManager 管理）
                playlistContent.querySelectorAll('.playlist-item').forEach(item => {
                    let touchStartX = 0;
                    let touchStartY = 0;
                    let isTouchMoving = false;
                    let isTouchDevice = false;
                    let touchHandled = false;

                    // 触摸开始 - 添加按下效果（使用 EventListenerManager 管理）
                    EventListenerManager.add(item, 'touchstart', (e) => {
                        isTouchDevice = true;
                        touchHandled = false;
                        touchStartX = e.touches[0].clientX;
                        touchStartY = e.touches[0].clientY;
                        isTouchMoving = false;
                        item.style.transform = 'scale(0.98)';
                        item.style.opacity = '0.8';
                    }, { passive: true });

                    // 触摸移动 - 检测是否滚动（使用 EventListenerManager 管理）
                    EventListenerManager.add(item, 'touchmove', (e) => {
                        const deltaX = Math.abs(e.touches[0].clientX - touchStartX);
                        const deltaY = Math.abs(e.touches[0].clientY - touchStartY);
                        if (deltaY > 10 || deltaX > 10) {
                            isTouchMoving = true;
                            item.style.transform = '';
                            item.style.opacity = '';
                        }
                    }, { passive: true });

                    // 触摸结束 - 如果没有移动则执行播放（使用 EventListenerManager 管理）
                    EventListenerManager.add(item, 'touchend', (e) => {
                        item.style.transform = '';
                        item.style.opacity = '';
                        touchHandled = true;
                        if (!isTouchMoving) {
                            const index = parseInt(item.dataset.index);
                            playSongFromPlaylist(index);
                        }
                        // 重置标记
                        setTimeout(() => {
                            touchHandled = false;
                            isTouchDevice = false;
                        }, 100);
                    }, { passive: true });

                    // 触摸取消 - 重置样式（使用 EventListenerManager 管理）
                    EventListenerManager.add(item, 'touchcancel', () => {
                        item.style.transform = '';
                        item.style.opacity = '';
                    }, { passive: true });

                    // 关键修复：鼠标点击事件 - 添加防重复触发逻辑
                    // 使用 touchHandled 标记防止触摸后 click 事件重复触发
                    EventListenerManager.add(item, 'click', (e) => {
                        // 如果触摸事件已处理或正在触摸设备上，则阻止 click 事件
                        if (isTouchDevice || touchHandled) {
                            e.stopPropagation();
                            e.preventDefault();
                            return;
                        }
                        const index = parseInt(item.dataset.index);
                        playSongFromPlaylist(index);
                    });
                });
            }
        }

        /**

        function showImportToast(results) {

            if (results.failed.length > 0) {
                message += `\n失败：${results.failed.length} 首`;
                message += '\n\n失败歌曲：' + results.failed.slice(0, 5).map(s => s.name).join('、');

                }

            importToastContent.textContent = message;

            // 3秒后自动关闭
            setTimeout(() => {
                hideImportToast();
            }, 3000);
        }

        /**

         */
        function hideImportToast() {
            importToast.classList.remove('show');
        }

        /**

         */
        function showImportProgress() {
            importProgressContainer.style.display = 'block';
        }

        /**
         * 隐藏导入进度
         */
        function hideImportProgress() {
            importProgressContainer.style.display = 'none';
            importProgressFill.style.width = '0%';
        }

        /**

         */
        function updateImportProgress(current, total, songName) {

        /**
         * 执行搜索 - 优先使用原生接口绕过 CORS 限制
         */
        async function performSearch(keyword) {
            console.log(`[搜索详细] ===== 开始搜索 =====`);
            console.log(`[搜索详细] 关键词: "${keyword}"`);
            
            if (!keyword) {
                searchContent.innerHTML = '<div class="search-placeholder">输入关键词搜索歌曲</div>';
                return;
            }

            searchContent.innerHTML = '<div class="search-loading"><i class="fa-solid fa-spinner fa-spin"></i> 搜索中...</div>';

            try {
                let searchData;

                // 关键修复：优先使用原生异步接口，绕过 WebView CORS 限制
                if (window.AndroidBridge && typeof window.AndroidBridge.nativeSearchSongsAsync === 'function') {
                    console.log(`[搜索详细] 使用原生异步接口: window.AndroidBridge.nativeSearchSongsAsync`);
                    console.log(`[搜索详细] 调用参数: keyword="${keyword}", page=1`);
                    
                    // 使用 Promise 包装异步回调
                    searchData = await new Promise((resolve, reject) => {
                        const callbackName = '_searchCallback_' + Date.now();
                        window[callbackName] = function(resultJson) {
                            try {
                                console.log(`[搜索详细] 原生搜索返回JSON长度: ${resultJson ? resultJson.length : 0}`);
                                const data = JSON.parse(resultJson);
                                console.log(`[搜索详细] 解析后 data.code: ${data.code}`);
                                resolve(data);
                            } catch (e) {
                                reject(e);
                            } finally {
                                delete window[callbackName];
                            }
                        };
                        window.AndroidBridge.nativeSearchSongsAsync(keyword, 1, callbackName);
                    });
                } else {
                    // 降级到 axios（用于 PC 浏览器调试）
                    console.log(`[搜索详细] 降级到 axios（PC 浏览器模式）`);
                    const response = await axios.get(`https://apis.netstart.cn/music/search?keywords=${encodeURIComponent(keyword)}`, {
                        timeout: 10000
                    });
                    searchData = response.data;
                    console.log(`[搜索详细] axios 搜索返回 searchData.code: ${searchData.code}`);
                }

                if (searchData && searchData.result && searchData.result.songs) {
                    console.log(`[搜索详细] 搜索结果: 找到 ${searchData.result.songs.length} 首歌曲`);
                    searchResults = searchData.result.songs;
                    renderSearchResults(searchResults);
                } else {
                    console.log(`[搜索详细] 未找到结果或格式不符: searchData.result存在=${!!(searchData && searchData.result)}, songs存在=${!!(searchData && searchData.result && searchData.result.songs)}`);
                    searchContent.innerHTML = '<div class="search-no-result">未找到相关歌曲</div>';
                }
            } catch (error) {
                console.error(`[搜索详细] 搜索失败:`, error.message);
                searchContent.innerHTML = '<div class="search-no-result">搜索失败，请重试</div>';
            }
        }

        /**
         * 渲染搜索结果
         */
        function renderSearchResults(songs) {
            if (songs.length === 0) {
                searchContent.innerHTML = '<div class="search-no-result">未找到相关歌曲</div>';
                return;
            }

            searchContent.innerHTML = songs.map((song, index) => {
                const artistNames = song.artists.map(a => a.name).join(', ');
                const isInPlaylist = songIds.includes(song.id);

                return `
                    <div class="search-result-item" data-index="${index}" data-id="${song.id}">
                        <div class="search-result-info">
                            <div class="search-result-title">${escapeHtml(song.name)}</div>
                            <div class="search-result-artist">${escapeHtml(artistNames)}</div>
                        </div>
                        <div class="search-result-add" data-index="${index}" title="${isInPlaylist ? '已在播放列表' : '添加到播放列表'}">
                            <i class="fa-solid ${isInPlaylist ? 'fa-check' : 'fa-plus'}"></i>
                        </div>
                    </div>
                `;
            }).join('');

            // 绑定点击事件（使用 EventListenerManager 管理）
            searchContent.querySelectorAll('.search-result-item').forEach(item => {
                // 点击歌曲信息播放
                EventListenerManager.add(item, 'click', (e) => {
                    if (!e.target.closest('.search-result-add')) {
                        const index = parseInt(item.dataset.index);
                        playSearchResult(index);
                    }
                });
            });

            searchContent.querySelectorAll('.search-result-add').forEach(btn => {
                // 点击加号添加
                EventListenerManager.add(btn, 'click', (e) => {
                    e.stopPropagation();
                    const index = parseInt(btn.dataset.index);
                    addToPlaylist(index);
                });
            });
        }

        /**
         * 播放搜索结果的歌曲
         */
        async function playSearchResult(index) {
            const song = searchResults[index];
            if (!song) return;

            // 关闭搜索面板
            closeSearchPanel();

            // 取消当前请求
            cancelPendingRequest();
            clearRetryTimeout();

            // 重置歌词
            cancelLyricRequest();
            clearLyricRetryTimeout();
            lyricRetryCount = 0;

            // 先检查本地缓存
            const cachedSongData = getSongCacheFromStorage(song.id);
            if (cachedSongData) {
                console.log(`[搜索播放详细] 搜索歌曲有缓存，使用缓存播放: ${song.id}`);
                playSearchResultWithCache(song, cachedSongData);
                return;
            }

            // 使用原有API获取歌曲播放URL
            console.log(`[搜索播放详细] ===== 开始搜索播放 =====`);
            console.log(`[搜索播放详细] 歌曲信息: id=${song.id}, name=${song.name || '未知'}`);
            console.log(`[搜索播放详细] 当前API索引: ${currentApiIndex}, 当前API: ${API_SERVERS[currentApiIndex].name}(${API_SERVERS[currentApiIndex].displayName})`);
            console.log(`[搜索播放详细] 当前API模式: ${API_SERVERS[currentApiIndex].mode}`);
            
            showLoading提示("加载歌曲中...");

            try {
                console.log(`[搜索播放详细] 开始请求 API 获取歌曲: ${song.id}`);
                
                // 获取当前API和歌曲名称
                const currentApi = API_SERVERS[currentApiIndex];
                let songName = '';
                
                if (currentApi.mode === 'search') {
                    // 落月API需要歌曲名称
                    songName = song.name || '';
                }
                
                const apiUrl = getApiUrl(song.id, 'exhigh', songName);
                console.log(`[搜索播放详细] getApiUrl 返回: ${apiUrl || 'null'}`);
                console.log(`[搜索播放详细] [API] 使用API: ${currentApi.name}(${currentApi.displayName}), URL: ${apiUrl}`);
                
                if (!apiUrl) {
                    console.error(`[搜索播放详细] 无法生成API请求`);
                    hideLoading提示();
                    showToast('无法生成API请求', 'error', 3000);
                    return;
                }
                
                // 关键修复：优先使用原生异步接口获取歌曲详情
                let songData;
                
                if (window.AndroidBridge && typeof window.AndroidBridge.nativeGetSongDetailAsync === 'function') {
                    console.log(`[搜索播放详细] 使用原生异步接口获取歌曲详情`);
                    
                    // 使用 Promise 包装异步回调
                    songData = await new Promise((resolve, reject) => {
                        const callbackName = '_detailCallback_' + Date.now();
                        window[callbackName] = function(resultJson) {
                            try {
                                console.log(`[搜索播放详细] 原生接口返回JSON前200字符: ${resultJson ? resultJson.substring(0, 200) : 'null'}`);
                                
                                const detailData = JSON.parse(resultJson);
                                console.log(`[搜索播放详细] 解析后 data.code: ${detailData.code}`);
                                
                                if (detailData.code === 200 && detailData.data) {
                                    const parsed = parseApiResponse({ data: detailData }, song.id);
                                    resolve(parsed);
                                } else {
                                    console.error(`[搜索播放详细] 原生接口返回失败: code=${detailData.code}`);
                                    reject(new Error(`原生接口返回失败: code=${detailData.code}`));
                                }
                            } catch (e) {
                                reject(e);
                            } finally {
                                delete window[callbackName];
                            }
                        };
                        window.AndroidBridge.nativeGetSongDetailAsync(String(song.id), callbackName);
                    });
                } else {
                    console.log(`[搜索播放详细] 降级到 axios`);
                    // 如果是搜索模式，需要先搜索再获取详情
                    if (currentApi.mode === 'search') {
                        console.log(`[搜索播放详细] 搜索模式：先搜索再获取详情`);
                        const response = await axios.get(apiUrl, {
                            timeout: 30000
                        });
                        console.log(`[搜索播放详细] 搜索API返回 code: ${response.data.code}`);
                        
                        if (response.data.code === 200 && response.data.data && Array.isArray(response.data.data)) {
                            const searchResults_data = response.data.data;
                            console.log(`[搜索播放详细] 搜索结果数量: ${searchResults_data.length}`);
                            
                            if (searchResults_data.length === 0) {
                                hideLoading提示();
                                showToast('搜索结果为空', 'error', 3000);
                                return;
                            }
                            
                            // 在搜索结果中匹配歌曲ID
                            const matchedSong = searchResults_data.find(s => String(s.id) === String(song.id));
                            let targetSong = matchedSong || searchResults_data[0];
                            console.log(`[搜索播放详细] 匹配结果: matchedSong=${!!matchedSong}, targetSong.id=${targetSong.id}`);
                            
                            if (!matchedSong) {
                                showToast(`未找到原歌曲，播放相似歌曲: ${targetSong.song}`, 'info', 3000);
                            }
                            
                            // 获取详情
                            const detailUrl = `${currentApi.url}?id=${targetSong.id}`;
                            console.log(`[搜索播放详细] 获取详情URL: ${detailUrl}`);
                            const detailResponse = await axios.get(detailUrl, {
                                timeout: 30000
                            });
                            
                            if (detailResponse.data.code === 200 && detailResponse.data.data) {
                                console.log(`[搜索播放详细] 详情获取成功`);
                                songData = parseApiResponse(detailResponse, targetSong.id);
                            } else {
                                console.error(`[搜索播放详细] 详情获取失败`);
                                throw new Error('获取歌曲详情失败');
                            }
                        } else {
                            console.error(`[搜索播放详细] 搜索API返回格式错误`);
                            throw new Error('搜索API返回格式错误');
                        }
                    } else {
                        console.log(`[搜索播放详细] ID模式：直接查询 ${song.id}`);
                        // 岑鬼鬼API：直接使用ID查询
                        const response = await axios.get(apiUrl, {
                            timeout: 30000
                        });
                        console.log(`[搜索播放详细] API响应 code: ${response.data.code}`);
                        songData = parseApiResponse(response, song.id);
                    }
                }
                
                console.log(`[搜索播放详细] parseApiResponse 返回: ${songData ? '存在' : 'null'}`);
                if (songData) {
                    console.log(`[搜索播放详细] songData.id: ${songData.id}`);
                    console.log(`[搜索播放详细] songData.name: ${songData.name || '未知'}`);
                    console.log(`[搜索播放详细] songData.url存在: ${!!songData.url}`);
                    if (songData.url) {
                        console.log(`[搜索播放详细] songData.url前100字符: ${songData.url.substring(0, 100)}`);
                    }
                }
                
                if (songData && songData.url) {
                    console.log('API 返回歌曲数据:', {
                        name: songData.name,
                        artist: songData.artist,
                        url: songData.url?.substring(0, 50) + '...',
                        duration: songData.duration
                    });

                    // 检查 URL 是否有效
                    if (!songData.url || songData.url.trim() === '' || songData.url.includes('file:///android_asset')) {
                        console.error('API 返回无效 URL:', songData.url);
                        hideLoading提示();
                        showToast('该歌曲暂时无法播放，请尝试其他歌曲', 'warning', 2500);
                        return;
                    }

                    // 更新播放器
                    currentCoverImage = songData.pic || defaultCover;
                    console.log('设置音频源:', songData.url?.substring(0, 50) + '...');
                    if (USE_NATIVE_PLAYER && window.AndroidBridge && typeof window.AndroidBridge.nativeLoadAndPlay === 'function') {
                        player.pause();
                        player.src = '';
                    } else {
                        player.src = songData.url;
                    }
                    songTitle.textContent = songData.name;
                    songArtist.textContent = songData.artist;

                    // 解析时长（兼容不同API格式）
                    if (songData.duration) {
                        // duration已经是毫秒数（由parseApiResponse统一处理）
                        totalDuration = songData.duration;
                        
                        // 格式化显示时间
                        const minutes = Math.floor(totalDuration / 60000);
                        const seconds = Math.floor((totalDuration % 60000) / 1000);
                        totalTimeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                    }

                    // 更新封面图
                    if (isInitialized) {
                        switchAlbumImage(currentCoverImage);
                    } else {
                        img1.src = currentCoverImage;
                        img2.src = currentCoverImage;
                    }

                    // 更新媒体会话
                    if ('mediaSession' in navigator) {
                        navigator.mediaSession.metadata = new MediaMetadata({
                            title: songData.name,
                            artist: songData.artist,
                            album: songData.album || "",
                            artwork: [
                                { src: currentCoverImage, sizes: '96x96', type: 'image/jpeg' },
                                { src: currentCoverImage, sizes: '256x256', type: 'image/jpeg' }
                            ]
                        });
                    }

                    // 通知原生端歌曲信息变化
                    notifyNativeSongInfo();

                    // 保存当前播放的歌曲ID（但不添加到播放列表）
                    currentPlayingSongId = song.id;

                    // 更新索引（如果歌曲在播放列表中）
                    const songIndexInPlaylist = songIds.indexOf(song.id);
                    if (songIndexInPlaylist >= 0) {
                        if (playMode === PlayMode.RANDOM) {
                            // 在随机队列中找到这首歌的位置
                            const posInRandomQueue = randomQueue.indexOf(song.id);
                            if (posInRandomQueue >= 0) {
                                randomIndex = posInRandomQueue;
                            }
                        } else {
                            currentIndex = songIndexInPlaylist;
                        }
                    }

                    // 保存歌曲信息到本地缓存
                    saveSongCacheToStorage(song.id, {
                        url: songData.url,
                        name: songData.name,
                        artist: songData.artist,
                        pic: songData.pic,
                        duration: songData.duration,
                        album: songData.album || ""
                    });

                    if (USE_NATIVE_PLAYER && window.AndroidBridge && typeof window.AndroidBridge.nativeLoadAndPlay === 'function') {
                        player.pause();
                        player.src = '';
                        const result = nativeLoadAndPlay(songData.url, 0);
                        if (result) {
                            // 原生播放器模式下，等待回调通知准备完成
                            if (lyricsEnabled) {
                                loadLyrics(song.id);
                            }
                            updatePlaylistCurrentInfo();
                        } else {
                            // 原生播放器失败，回退到Web Audio
                            console.warn("原生播放器播放失败，回退到Web Audio");
                            playWithWebAudio(songData.url, song.id);
                        }
                    } else {
                        // 使用Web Audio
                        playWithWebAudio(songData.url, song.id);
                    }
                } else {
                    hideLoading提示();
                    showToast('歌曲加载失败', 'error', 2500);
                }
            } catch (error) {
                console.error('获取歌曲信息失败:', error);
                handleApiError(error, song.id);
            }
        }

        /**
         * 使用Web Audio播放歌曲（搜索结果）
         */
        function playWithWebAudio(url, songId) {
            player.src = url;
            player.load();
            player.play().then(() => {
                isLoading = false;
                isInitialized = true;
                enableButtons();
                hideLoading提示();
                startSyncInterval();

                // 加载歌词
                if (lyricsEnabled) {
                    loadLyrics(songId);
                }

                updatePlaylistCurrentInfo();
            }).catch(err => {
                console.error('播放失败:', err);
                console.error('播放器状态:', {
                    src: player.src,
                    networkState: player.networkState,
                    readyState: player.readyState,
                    paused: player.paused,
                    error: player.error
                });
                hideLoading提示();
            });
        }

        /**

                        { src: currentCoverImage, sizes: '96x96', type: 'image/jpeg' },
                        { src: currentCoverImage, sizes: '256x256', type: 'image/jpeg' }
                    ]
                });
            }

            // 通知原生端歌曲信息变化
            notifyNativeSongInfo();

            // 保存当前播放的歌曲ID
            currentPlayingSongId = song.id;

            // 更新索引（如果歌曲在播放列表中）
            const songIndexInPlaylist = songIds.indexOf(song.id);
            if (songIndexInPlaylist >= 0) {
                if (playMode === PlayMode.RANDOM) {
                    const posInRandomQueue = randomQueue.indexOf(song.id);
                    if (posInRandomQueue >= 0) {
                        randomIndex = posInRandomQueue;
                    }
                } else {
                    currentIndex = songIndexInPlaylist;
                }
            }

            if (USE_NATIVE_PLAYER && window.AndroidBridge && typeof window.AndroidBridge.nativeLoadAndPlay === 'function') {

                player.src = '';
                const result = nativeLoadAndPlay(cachedData.url, 0);
                if (result) {

        /**
         * 使用Web Audio播放搜索结果的缓存歌曲
         */
        function playSearchResultWithWebAudio(song, cachedData) {
            player.src = cachedData.url;
            player.load();
            player.play().then(() => {
                isLoading = false;
                isInitialized = true;
                enableButtons();
                hideLoading提示();
                startSyncInterval();

                // 加载歌词
                if (lyricsEnabled) {
                    loadLyrics(song.id);
                }

                updatePlaylistCurrentInfo();
                showToast('已从缓存播放', 'info', 1500);
            }).catch(err => {
                console.error('缓存播放失败:', err);

                localStorage.removeItem(CACHE_CONFIG.SONG_CACHE_PREFIX + song.id);

        /**
         * 添加歌曲到播放列表
         */
        async function addToPlaylist(index) {
            const song = searchResults[index];
            if (!song) return;

            // 检查是否已在播放列表中
            if (songIds.includes(song.id)) {
                showToast('该歌曲已在播放列表中', 'warning', 2000);
                return;
            }

            // 禁用添加按钮，防止多次点击
            const addBtn = searchContent.querySelector(`.search-result-add[data-index="${index}"]`);
            if (addBtn) {
                addBtn.classList.add('disabled');
                addBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                addBtn.style.pointerEvents = 'none';
            }

            // 获取歌曲详细信息
            let songData = null;
            try {
                const apiUrl = getApiUrl(song.id, 'exhigh');
                const response = await axios.get(apiUrl, {
                    timeout: 30000  // 增加超时时间到30秒
                });

                songData = parseApiResponse(response, song.id);
            } catch (error) {
                console.error('获取歌曲详情失败:', error);
                // API 失败时，使用搜索结果中的基本信息继续
            }

            // 即使 API 失败，也添加到播放列表（使用搜索结果中的基本信息）
            const artistNames = song.artists ? song.artists.map(a => a.name).join(', ') : '未知歌手';
            
            // 添加到songIds数组
            songIds.push(song.id);

            // 创建歌曲信息对象
            const songInfo = {
                id: song.id,
                index: songIds.length - 1,
                name: songData?.name || song.name,
                artist: songData?.artist || artistNames,
                pic: songData?.pic || defaultCover
            };

        /**
         * 开始导入歌曲
         */
        async function startImportSongs() {
            const text = importTextarea.value.trim();
            if (!text) {
                showToast('请输入要导入的歌曲列表', 'warning', 2000);
                return;
            }

            // 禁用导入按钮
            importBtnConfirm.disabled = true;
            importBtnConfirm.textContent = '导入中...';

            // 清洗文本，提取歌曲信息
            const songs = parseImportText(text);
            if (songs.length === 0) {
                showToast('未能识别有效的歌曲格式', 'warning', 2500);
                importBtnConfirm.disabled = false;
                importBtnConfirm.textContent = '确定导入';
                return;
            }

            // 显示进度条
            showImportProgress();

            const results = {
                success: [],
                failed: []
            };

            // 逐首导入
            for (let i = 0; i < songs.length; i++) {
                const song = songs[i];
                updateImportProgress(i + 1, songs.length, song.name);

                try {
                    const result = await importSingleSong(song);
                    if (result.success) {
                        results.success.push(result);
                    } else {
                        results.failed.push({ ...song, reason: result.reason });
                    }
                } catch (error) {
                    results.failed.push({ ...song, reason: '导入失败' });
                }

                // 小延迟避免请求过快
                await new Promise(resolve => setTimeout(resolve, 300));
            }

            // 完成
            hideImportProgress();
            importBtnConfirm.disabled = false;
            importBtnConfirm.textContent = '确定导入';

            // 显示结果
            showImportToast(results);

            // 保存到 Android 本地存储（如果是 Android 环境）
            if (results.success.length > 0 && typeof window.savePlaylistToAndroid === 'function') {
                window.savePlaylistToAndroid().then(success => {
                    if (success) {
                        console.log('[Import] 播放列表已保存到 Android');
                    }
                });
            }

            // 清空输入
            importTextarea.value = '';
        }

        /**
         * 解析导入文本
         * 格式：歌名 - 歌手1 / 歌手2
         */
        function parseImportText(text) {
            const lines = text.split('\n').filter(line => line.trim());
            const songs = [];

            for (const line of lines) {
                const parsed = parseSongLine(line.trim());
                if (parsed) {
                    songs.push(parsed);
                }
            }

            return songs;
        }

        /**
         * 解析单行歌曲信息
         */
        function parseSongLine(line) {
            // 匹配格式：歌名 - 歌手 或 歌名 - 歌手1 / 歌手2
            const match = line.match(/^(.+?)\s*[-–—]\s*(.+)$/);
            if (!match) return null;

            const name = match[1].trim();
            const artistsText = match[2].trim();

            // 分割多个歌手
            const artists = artistsText.split(/[\/\\,，&]/).map(a => a.trim()).filter(a => a);

            return { name, artists };
        }

        /**
         * 查找最匹配的歌曲
         */
        function findBestMatch(targetSong, searchResults) {
            let bestMatch = null;
            let bestScore = 0;

            for (const result of searchResults) {
                const score = calculateMatchScore(targetSong, result);
                if (score > bestScore && score >= 0.6) {
                    bestScore = score;
                    bestMatch = result;
                }
            }

            return bestMatch;
        }

        /**
         * 计算匹配分数
         */
        function calculateMatchScore(target, result) {
            // 歌名相似度
            const nameScore = calculateSimilarity(target.name, result.name);

            // 歌手匹配度
            let artistScore = 0;
            const resultArtists = result.artists.map(a => a.name);

            for (const targetArtist of target.artists) {
                for (const resultArtist of resultArtists) {
                    const sim = calculateSimilarity(targetArtist, resultArtist);
                    if (sim > artistScore) {
                        artistScore = sim;
                    }
                }
            }

            // 综合分数：歌名60% + 歌手40%
            return nameScore * 0.6 + artistScore * 0.4;
        }

        /**
         * 计算文本相似度（编辑距离算法）
         */
        function calculateSimilarity(str1, str2) {
            str1 = str1.toLowerCase().trim();
            str2 = str2.toLowerCase().trim();

            if (str1 === str2) return 1;
            if (str1.includes(str2) || str2.includes(str1)) return 0.9;

            const len1 = str1.length;
            const len2 = str2.length;

            // 创建编辑距离矩阵
            const matrix = [];
            for (let i = 0; i <= len1; i++) {
                matrix[i] = [i];
            }
            for (let j = 0; j <= len2; j++) {
                matrix[0][j] = j;
            }

            // 计算编辑距离
            for (let i = 1; i <= len1; i++) {
                for (let j = 1; j <= len2; j++) {
                    const cost = str1[i - 1] === str2[j - 1] ? 0 : 1;
                    matrix[i][j] = Math.min(
                        matrix[i - 1][j] + 1,      // 删除
                        matrix[i][j - 1] + 1,      // 插入
                        matrix[i - 1][j - 1] + cost // 替换
                    );
                }
            }

            const maxLen = Math.max(len1, len2);
            const distance = matrix[len1][len2];

            return 1 - distance / maxLen;
        }
