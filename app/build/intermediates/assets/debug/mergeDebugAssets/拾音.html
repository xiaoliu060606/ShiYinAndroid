        /**
         * 添加触摸事件支持（使用 EventListenerManager 管理）
         */
        function addTouchSupport(element) {
            let isTouching = false;
            let touchHandled = false;

            EventListenerManager.add(element, 'touchstart', (e) => {
                isTouching = true;
                touchHandled = false;
                element.style.transform = 'scale(0.95)';
                element.style.opacity = '0.8';
            }, { passive: true });

            EventListenerManager.add(element, 'touchend', (e) => {
                element.style.transform = 'scale(1)';
                element.style.opacity = '1';
                touchHandled = true;
                isTouching = false;
            }, { passive: true });

            EventListenerManager.add(element, 'touchcancel', (e) => {
                element.style.transform = 'scale(1)';
                element.style.opacity = '1';
                touchHandled = false;
                isTouching = false;
            }, { passive: true });

            // 关键修复：添加点击事件处理，使用 touchHandled 标记防止重复触发
            EventListenerManager.add(element, 'click', (e) => {
                // 如果触摸事件已处理，则阻止 click 事件重复触发
                if (touchHandled) {
                    e.stopPropagation();
                    e.preventDefault();
                    return;
                }
                // 点击时重置样式
                element.style.transform = 'scale(1)';
                element.style.opacity = '1';
            });
        }

        /**
         * 从播放列表删除歌曲（删除全部数据）
         */
        function deleteSongFromPlaylist(index) {
            if (index < 0 || index >= songIds.length) return;

            const songIdToDelete = songIds[index];
            const songName = playlistData.find(s => s.id === songIdToDelete)?.name || '这首歌曲';
            const isCurrentlyPlaying = songIdToDelete === currentPlayingSongId;

            // 使用自定义确认弹窗
            const confirmMsg = isCurrentlyPlaying
                ? `"${songName}" 正在播放，删除后将自动播放下一首，确定删除吗？`
                : `确定要从播放列表删除 "${songName}" 吗？`;
            
            showConfirmDialog(
                '确认删除',
                confirmMsg,
                () => {
                    // 确认删除
                    performDeleteSong(index, songIdToDelete, songName, isCurrentlyPlaying);
                },
                () => {
                    // 取消删除
                    console.log('取消删除歌曲');
                }
            );
        }

        /**
         * 执行删除歌曲操作
         */
        function performDeleteSong(index, songIdToDelete, songName, isCurrentlyPlaying) {
            // 从songIds中删除
            songIds.splice(index, 1);

            // 从playlistData中删除
            playlistData = playlistData.filter(s => s.id !== songIdToDelete);

            // 从无版权歌曲集合中删除
            clearNoCopyrightMark(songIdToDelete);

            // 重新计算索引
            playlistData.forEach((song, i) => {
                song.index = i;
            });

            // 保存到JSON文件
            savePlaylistToJSON();

            console.log(`已删除歌曲 "${songName}"`);

            // 如果删除的是当前播放的歌曲，播放下一首
            if (isCurrentlyPlaying) {
                console.log('删除当前播放歌曲，自动播放下一首');

                // 如果播放列表为空，停止播放
                if (songIds.length === 0) {
                    player.pause();
                    player.src = '';
                    currentPlayingSongId = null;
                    isPlaying = false;
                    isInitialized = false;
                    icons.classList.remove('fa-pause');
                    icons.classList.add('fa-play');
                    songTitle.textContent = '没有歌曲';
                    songArtist.textContent = '请添加歌曲';
                    showToast('播放列表已空，请添加歌曲', 'warning', 2500);
                } else {
                    // 调整索引
                    if (playMode === PlayMode.RANDOM) {
                        // 随机模式：从随机队列中删除并播放下一首
                        const posInRandomQueue = randomQueue.indexOf(songIdToDelete);
                        if (posInRandomQueue >= 0) {
                            randomQueue.splice(posInRandomQueue, 1);
                            // 保持当前randomIndex位置（删除后下一位自动前移）
                            if (randomIndex >= randomQueue.length) {
                                randomIndex = 0;
                            }
                        }
                        // 播放下一首
                        setTimeout(() => playNextSong(), 100);
                    } else {
                        // 顺序模式
                        if (currentIndex >= songIds.length) {
                            currentIndex = 0;
                        }
                        // 播放当前索引位置的歌曲（删除后下一位自动前移）
                        setTimeout(() => loadAndPlaySong(currentIndex, 0), 100);
                    }
                }
            } else {
                // 非当前播放歌曲，只调整索引
                if (currentIndex > index) {
                    currentIndex--;
                }

                // 更新随机队列
                const posInRandomQueue = randomQueue.indexOf(songIdToDelete);
                if (posInRandomQueue >= 0) {
                    randomQueue.splice(posInRandomQueue, 1);
                    if (randomIndex > posInRandomQueue) {
                        randomIndex--;
                    }
                }
            }

            // 重新渲染
            renderPlaylist();
            updatePlaylistCurrentInfo();
        }

        /**
         * 从播放列表播放歌曲
         */
        function playSongFromPlaylist(index) {
            if (index < 0 || index >= songIds.length) return;

            // 关闭播放列表
            closePlaylist();

            // 取消当前请求
            cancelPendingRequest();
            clearRetryTimeout();

            // 重置歌词
            cancelLyricRequest();
            clearLyricRetryTimeout();
            lyricRetryCount = 0;

            // 获取用户点击的歌曲ID
            const targetSongId = songIds[index];

            // 根据播放模式设置索引
            if (playMode === PlayMode.RANDOM) {
                // 随机模式下，将指定歌曲设为当前随机索引
                const randomQueueIndex = randomQueue.indexOf(targetSongId);
                if (randomQueueIndex !== -1) {
                    randomIndex = randomQueueIndex;
                } else {
                    // 如果不在随机队列中，将歌曲插入到随机队列当前位置
                    if (randomQueue.length === 0) {
                        initRandomQueue();
                    }
                    // 将目标歌曲插入到当前随机索引位置
                    randomQueue.splice(randomIndex, 0, targetSongId);
                }
            } else {
                currentIndex = index;
            }

            // 加载并播放歌曲 - 使用歌曲ID确保播放正确的歌曲
            loadAndPlaySongById(targetSongId, 0);
        }

        /**
         * 根据歌曲ID加载并播放歌曲
         */
        function loadAndPlaySongById(songId, seekTime = 0) {
            if (!songId) return;

            isLoading = true;
            disableButtons();
            showLoading提示("加载中...");

            // 重置播放器状态
            player.pause();
            player.currentTime = 0;
            currentProgress = 0;
            updateProgress();

            // 记录当前要播放的歌曲ID
            currentPlayingSongId = songId;

            // 先检查本地存储的歌曲缓存（3小时有效期）
            const cachedSongData = getSongCacheFromStorage(songId);
            if (cachedSongData) {
                console.log(`使用本地缓存播放歌曲: ${songId}`);
                playWithCachedData(songId, cachedSongData, -1, seekTime);
                return;
            }

            cancelPendingRequest();
            cancelTokenSource = axios.CancelToken.source();

            // 根据当前API模式获取歌曲名称（落月API需要）
            const currentApi = API_SERVERS[currentApiIndex];
            let songName = '';
            
            if (currentApi.mode === 'search') {
                // 从播放列表缓存中获取歌曲名称
                const playlistCache = getPlaylistCache();
                const songInfo = playlistCache.find(s => String(s.id) === String(songId));
                if (songInfo && songInfo.name) {
                    songName = songInfo.name;
                    console.log(`[API] 从播放列表获取歌曲名称: ${songName}`);
                } else {
                    console.warn('[API] 无法获取歌曲名称，无法使用落月API');
                    hideLoading提示();
                    showToast('无法获取歌曲信息，请稍后重试', 'error', 3000);
                    isLoading = false;
                    enableButtons();
                    return;
                }
            }

            // 使用API获取歌曲信息
            const apiUrl = getApiUrl(songId, 'exhigh', songName);
            
            if (!apiUrl) {
                hideLoading提示();
                showToast('无法生成API请求', 'error', 3000);
                isLoading = false;
                enableButtons();
                return;
            }
            
            console.log(`[API] 使用${currentApi.displayName}:`, apiUrl);

            // 如果是搜索模式，需要先搜索再获取详情
            if (currentApi.mode === 'search') {
                // 落月API搜索模式
                axios.get(apiUrl, {
                    cancelToken: cancelTokenSource.token,
                    timeout: 30000
                })
                .then(res => {
                    if (res.data.code === 200 && res.data.data && Array.isArray(res.data.data)) {
                        const searchResults = res.data.data;
                        
                        if (searchResults.length === 0) {
                            throw { status: 500, response: { data: { message: '搜索结果为空' } } };
                        }
                        
                        // 在搜索结果中匹配歌曲ID
                        const matchedSong = searchResults.find(s => String(s.id) === String(songId));
                        
                        if (matchedSong) {
                            console.log('[API] 找到精确匹配的歌曲:', matchedSong.song);
                            // 使用匹配的歌曲ID获取详情
                            const detailUrl = `${currentApi.url}?id=${matchedSong.id}`;
                            return axios.get(detailUrl, {
                                cancelToken: cancelTokenSource.token,
                                timeout: 30000
                            });
                        } else {
                            console.log('[API] 未找到精确匹配，使用搜索结果第一首');
                            const firstSong = searchResults[0];
                            showToast(`未找到原歌曲，播放相似歌曲: ${firstSong.song}`, 'info', 3000);
                            // 使用第一首歌曲的ID获取详情
                            const detailUrl = `${currentApi.url}?id=${firstSong.id}`;
                            return axios.get(detailUrl, {
                                cancelToken: cancelTokenSource.token,
                                timeout: 30000
                            });
                        }
                    } else {
                        throw { status: 500, response: { data: { message: '搜索API返回格式错误' } } };
                    }
                })
                .then(res => {
                    // 处理详情响应
                    if (res.data.code === 200 && res.data.data) {
                        return res;
                    } else {
                        throw { status: 500, response: { data: { message: '获取歌曲详情失败' } } };
                    }
                })
                .then(res => processApiResponse(res, songId, seekTime))
                .catch(error => handleApiError(error, songId));
            } else {
                // 岑鬼鬼API：直接使用ID查询
                axios.get(apiUrl, {
                    cancelToken: cancelTokenSource.token,
                    timeout: 30000
                })
                .then(res => processApiResponse(res, songId, seekTime))
                .catch(error => handleApiError(error, songId));
            }
        }
        
        // 处理API响应
        function processApiResponse(res, songId, seekTime = 0) {
            if (res.data.code === 200 && res.data.data) {
                // 检测版权错误：如果url包含特定错误信息，标记为无版权歌曲
                const songUrl = res.data.data.url || '';
                const isNoCopyright = songUrl.includes('获取歌曲地址失败，可能是会员到期了');
                
                if (isNoCopyright) {
                    console.log(`检测到无版权歌曲: ${songId}`);
                    markSongAsNoCopyright(songId);
                    isLoading = false;
                    enableButtons();
                    hideLoading提示();
                    showToast('该歌曲无版权，自动跳过', 'warning', 2000);
                    setTimeout(() => {
                        playNextSong();
                    }, 500);
                    return;
                }
                
                currentCoverImage = res.data.data.pic || defaultCover;
                if (USE_NATIVE_PLAYER && window.AndroidBridge && typeof window.AndroidBridge.nativeLoadAndPlay === 'function') {
                    player.pause();
                    player.src = '';
                } else {
                    player.src = res.data.data.url;
                }
                songTitle.textContent = res.data.data.name;
                songArtist.textContent = res.data.data.artist;

                // 保存歌曲信息到本地缓存（3小时有效期）
                saveSongCacheToStorage(songId, {
                    url: res.data.data.url,
                    name: res.data.data.name,
                    artist: res.data.data.artist,
                    pic: res.data.data.pic,
                    duration: res.data.data.duration,
                    album: res.data.data.album || ""
                });

                // 解析时长格式 (mm:ss) 为毫秒
                const durationParts = res.data.data.duration.split(':');
                const minutes = parseInt(durationParts[0], 10);
                const seconds = parseInt(durationParts[1], 10);
                totalDuration = (minutes * 60 + seconds) * 1000;
                totalTimeDisplay.textContent = res.data.data.duration;

                // 更新封面图
                if (isInitialized) {
                    switchAlbumImage(currentCoverImage);
                } else {
                    img1.src = currentCoverImage;
                    img2.src = currentCoverImage;
                }

                // 更新媒体会话元数据
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: res.data.data.name,
                        artist: res.data.data.artist,
                        album: res.data.data.album || "",
                        artwork: [
                            { src: currentCoverImage, sizes: '96x96', type: 'image/jpeg' },
                            { src: currentCoverImage, sizes: '256x256', type: 'image/jpeg' }
                        ]
                    });
                }

                // 通知原生端歌曲信息变化
                notifyNativeSongInfo();
                
                // 更新通知栏状态为播放中
                updateNotificationStatus("playing", res.data.data.name, res.data.data.artist);

                // 立即设置初始位置为0，确保系统进度条正确重置
                if (supportsMediaSessionPositionState) {
                    navigator.mediaSession.setPositionState({
                        duration: totalDuration / 1000,
                        position: 0,
                        playbackRate: 1
                    });
                }

                // 关键修复：切歌后强制同步系统进度条，确保不会停留在上一首歌的进度
                forceSyncMediaSession();

                if (USE_NATIVE_PLAYER && window.AndroidBridge && typeof window.AndroidBridge.nativeLoadAndPlay === 'function') {
                    player.pause();
                    player.src = '';
                    const result = window.AndroidBridge.nativeLoadAndPlay(res.data.data.url, seekTime * 1000);
                    if (result) {
                        isLoading = false;
                        enableButtons();
                        hideLoading提示();
                        isInitialized = true;
                        
                        // 加载歌词
                        if (lyricsEnabled) {
                            loadLyrics(songId);
                        }
                        
                        updatePlaylistCurrentInfo();
                    } else {
                        // 原生播放器失败，回退到 Web Audio
                        console.warn("原生播放器播放失败，回退到Web Audio");
                        player.src = res.data.data.url;
                        
                        // 等待音频可以播放
                        const handleCanPlay = () => {
                            player.removeEventListener('canplay', handleCanPlay);
                            player.removeEventListener('error', handleError);
                            
                            // 如果有指定seekTime，先设置位置
                            if (seekTime > 0) {
                                player.currentTime = seekTime;
                            }

                            // 播放
                            player.play().then(() => {
                                isLoading = false;
                                enableButtons();
                                hideLoading提示();
                                isInitialized = true;

                                // 加载歌词
                                if (lyricsEnabled) {
                                    loadLyrics(songId);
                                }

                                updatePlaylistCurrentInfo();
                            }).catch(error => {
                                console.error('播放失败:', error);
                                isLoading = false;
                                enableButtons();
                                hideLoading提示();
                                showToast('播放失败: ' + (error.message || '未知错误'), 'error', 3000);
                            });
                        };

                        const handleError = () => {
                            player.removeEventListener('canplay', handleCanPlay);
                            player.removeEventListener('error', handleError);
                            isLoading = false;
                            enableButtons();
                            hideLoading提示();
                            showToast('音频加载失败', 'error', 3000);
                        };

                        player.addEventListener('canplay', handleCanPlay);
                        player.addEventListener('error', handleError);
                        player.load();
                    }
                } else {
                    // Web Audio 模式（保留原来的逻辑）
                    // 等待音频可以播放
                    const handleCanPlay = () => {
                        player.removeEventListener('canplay', handleCanPlay);
                        player.removeEventListener('error', handleError);
                        
                        // 如果有指定seekTime，先设置位置
                        if (seekTime > 0) {
                            player.currentTime = seekTime;
                        }

                        // 播放
                        player.play().then(() => {
                            isLoading = false;
                            enableButtons();
                            hideLoading提示();
                            isInitialized = true;

                            // 加载歌词
                            if (lyricsEnabled) {
                                loadLyrics(songId);
                            }

                            updatePlaylistCurrentInfo();
                        }).catch(error => {
                            console.error('播放失败:', error);
                            isLoading = false;
                            enableButtons();
                            hideLoading提示();
                            showToast('播放失败: ' + (error.message || '未知错误'), 'error', 3000);
                        });
                    };

                    const handleError = () => {
                        player.removeEventListener('canplay', handleCanPlay);
                        player.removeEventListener('error', handleError);
                        isLoading = false;
                        enableButtons();
                        hideLoading提示();
                        showToast('音频加载失败', 'error', 3000);
                    };

                    player.addEventListener('canplay', handleCanPlay);
                    player.addEventListener('error', handleError);
                    player.load();
                }

            } else {
                throw new Error("API返回无效数据");
            }
        }
        
        // 处理API错误
        function handleApiError(error, songId) {
            console.error('[API] API请求失败:', error);
            
            // 检测API错误类型
            let shouldSwitchApi = false;
            let errorMessage = '歌曲加载失败';
            const currentApi = API_SERVERS[currentApiIndex];
            
            // 0. 处理重试耗尽的情况（从lastError中获取真实错误信息）
            if (error.maxRetriesExceeded && error.lastError) {
                console.log('[API] 重试耗尽，获取真实错误信息:', error.lastError);
                // 用真实错误替换当前错误
                error = error.lastError;
            }
            
            // 1. API服务器错误（应该切换API）
            if (error.status === 502 || error.status === 503) {
                shouldSwitchApi = true;
                errorMessage = `${currentApi.displayName}服务器正在维护中`;
                console.log(`[API] ${currentApi.displayName}服务器错误(${error.status})`);
            }
            // 2. 网络错误（应该切换API）
            else if (error.isNetworkError) {
                shouldSwitchApi = true;
                errorMessage = `${currentApi.displayName}网络连接失败`;
                console.log('[API] 检测到网络错误');
            }
            // 3. 请求超时（应该切换API）
            else if (error.isTimeout) {
                shouldSwitchApi = true;
                errorMessage = `${currentApi.displayName}请求超时`;
                console.log('[API] 检测到请求超时');
            }
            // 4. 落月API返回500错误（歌曲不存在）
            else if (currentApi.name === 'vkeys' && error.status === 500 && error.response?.data?.message?.includes('未找到当前歌曲信息')) {
                console.log('[API] 落月API未找到歌曲');
                errorMessage = '歌曲在落月API中不存在';
                shouldSwitchApi = false;  // 不切换API，直接提示用户
            }
            // 5. 其他500错误（可能是服务器问题，尝试切换）
            else if (error.status === 500) {
                shouldSwitchApi = true;
                errorMessage = `${currentApi.displayName}服务器内部错误`;
                console.log('[API] 检测到500错误');
            }
            // 6. 其他错误
            else {
                shouldSwitchApi = false;
                errorMessage = error.message || '未知错误';
            }
            
            // 尝试切换到备用API
            if (shouldSwitchApi) {
                console.log('[API] 当前API失败，尝试切换到备用API');
                if (switchToNextApi(errorMessage)) {
                    // 切换成功，重新尝试加载
                    console.log('[API] 已切换到备用API，重新加载歌曲');
                    setTimeout(() => {
                        loadAndPlaySongById(songId);
                    }, 1000);
                    return;
                }
            }
            
            hideLoading提示();
            showToast(errorMessage, 'error', 3000);
            isLoading = false;
            enableButtons();
        }

        // ==================== 本地存储缓存工具函数 ====================

        /**
         * 从本地存储获取歌曲缓存
         */
        function getSongCacheFromStorage(songId) {
            if (!songId || songId === 'undefined') {
                return null;
            }
            try {
                const key = CACHE_CONFIG.SONG_CACHE_PREFIX + songId;
                const data = localStorage.getItem(key);
                if (data) {
                    const cache = JSON.parse(data);
                    // 检查是否过期
                    if (Date.now() - cache.timestamp < CACHE_CONFIG.SONG_CACHE_DURATION) {
                        // 更新访问记录
                        updateCacheAccess(songId);
                        return cache;
                    } else {
                        // 过期了，删除并标记需要重新获取
                        localStorage.removeItem(key);
                        console.log(`歌曲 ${songId} 缓存已过期，已删除，需要重新获取`);
                        
                        // 标记该歌曲需要重新获取缓存
                        markCacheForRefresh(songId);
                    }
                }
            } catch (error) {
                console.error('读取歌曲缓存失败:', error);
            }
            return null;
        }

        /**
         * 标记缓存需要刷新
         * @param {string} songId 歌曲ID
         */
        function markCacheForRefresh(songId) {
            if (!songId) return;
            
            // 使用单独的标记来记录需要刷新的缓存
            const refreshKey = CACHE_CONFIG.SONG_CACHE_PREFIX + 'refresh_' + songId;
            localStorage.setItem(refreshKey, Date.now().toString());
            
            console.log(`标记歌曲 ${songId} 需要刷新缓存`);
            
            // 如果在线且有网络，立即尝试刷新
            if (isOnline) {
                refreshExpiredCache(songId);
            }
        }

        /**
         * 刷新过期缓存
         * @param {string} songId 歌曲ID
         */
        function refreshExpiredCache(songId) {
            if (!songId || !isOnline) return;
            
            console.log(`开始刷新歌曲 ${songId} 的过期缓存`);
            
            // 使用后台任务刷新缓存，不影响当前播放
            setTimeout(() => {
                const currentSongInfo = playlistData.find(s => s.id === songId);
                const songName = currentSongInfo ? currentSongInfo.name : '';
                const apiUrl = getApiUrl(songId, 'exhigh', songName);
                
                if (!apiUrl) {
                    console.error(`[API] 无法获取歌曲 ${songId} 的API URL`);
                    return;
                }
                
                axios.get(apiUrl, {
                    timeout: 15000
                }).then(res => {
                    const parsedData = parseApiResponse(res, songId);
                    if (parsedData && parsedData.url) {
                        // 检查版权
                        const songUrl = parsedData.url || '';
                        const isNoCopyright = songUrl.includes('获取歌曲地址失败，可能是会员到期了');
                        
                        if (!isNoCopyright) {
                            // 保存新的缓存
                            saveSongCacheToStorage(songId, {
                                url: parsedData.url,
                                name: parsedData.name,
                                artist: parsedData.artist,
                                pic: parsedData.pic,
                                duration: parsedData.duration,
                                album: parsedData.album || "",
                                timestamp: Date.now()
                            });
                            
                            // 清除刷新标记
                            const refreshKey = CACHE_CONFIG.SONG_CACHE_PREFIX + 'refresh_' + songId;
                            localStorage.removeItem(refreshKey);
                            
                            console.log(`歌曲 ${songId} 缓存刷新成功`);
                        } else {
                            console.log(`歌曲 ${songId} 无版权，跳过缓存刷新`);
                        }
                    }
                }).catch(error => {
                    console.error(`刷新歌曲 ${songId} 缓存失败:`, error);
                    // 失败后保留刷新标记，下次再尝试
                });
            }, 1000); // 延迟1秒执行，避免影响当前播放
        }

        /**
         * 检查并刷新即将过期的缓存
         */
        function checkAndRefreshCache(songId) {
            if (!songId || !isOnline) return;
            
            try {
                const key = CACHE_CONFIG.SONG_CACHE_PREFIX + songId;
                const data = localStorage.getItem(key);
                if (data) {
                    const cache = JSON.parse(data);
                    const timeRemaining = CACHE_CONFIG.SONG_CACHE_DURATION - (Date.now() - cache.timestamp);
                    
                    // 如果缓存将在5分钟内过期，提前刷新
                    if (timeRemaining < 5 * 60 * 1000 && timeRemaining > 0) {
                        console.log(`歌曲 ${songId} 缓存即将过期（${Math.round(timeRemaining/1000)}秒后），提前刷新`);
                        refreshExpiredCache(songId);
                    }
                }
            } catch (error) {
                console.error('检查缓存过期时间失败:', error);
            }
        }

        /**
         * 保存歌曲缓存到本地存储
         */
        function saveSongCacheToStorage(songId, songData) {
            if (!songId || songId === 'undefined') {
                console.warn('无效的歌曲ID，跳过缓存');
                return;
            }
            try {
                const key = CACHE_CONFIG.SONG_CACHE_PREFIX + songId;
                const cache = {
                    ...songData,
                    timestamp: Date.now(),
                    accessCount: 1, // 记录访问次数
                    lastAccessed: Date.now() // 记录最后访问时间
                };
                localStorage.setItem(key, JSON.stringify(cache));
                console.log(`歌曲 ${songId} 已缓存到本地`);
            } catch (error) {
                console.error('保存歌曲缓存失败:', error);
                // 如果存储失败（可能是空间不足），尝试清理过期缓存后重试
                if (error.name === 'QuotaExceededError') {
                    cleanupExpiredCache();
                    try {
                        localStorage.setItem(key, JSON.stringify(cache));
                        console.log(`歌曲 ${songId} 清理后重新缓存成功`);
                    } catch (retryError) {
                        console.error('清理后仍然无法缓存:', retryError);
                    }
                }
            }
        }

        /**
         * 清理过期的歌曲播放缓存（只清理歌曲播放缓存，播放列表永久保留）
         */
        function cleanupExpiredCache() {
            try {
                const now = Date.now();
                let cleanedCount = 0;

                // 遍历localStorage查找过期的歌曲缓存
                for (let i = localStorage.length - 1; i >= 0; i--) {
                    const key = localStorage.key(i);
                    // 只清理歌曲播放缓存，不清理播放列表
                    if (key && key.startsWith(CACHE_CONFIG.SONG_CACHE_PREFIX)) {
                        try {
                            const data = localStorage.getItem(key);
                            if (data) {
                                const cache = JSON.parse(data);
                                if (now - cache.timestamp >= CACHE_CONFIG.SONG_CACHE_DURATION) {
                                    localStorage.removeItem(key);
                                    cleanedCount++;
                                }
                            }
                        } catch (e) {
                            // 解析失败，删除
                            localStorage.removeItem(key);
                            cleanedCount++;
                        }
                    }
                }

                if (cleanedCount > 0) {
                    console.log(`清理了 ${cleanedCount} 个过期歌曲缓存`);
                }
            } catch (error) {
                console.error('清理过期缓存失败:', error);
            }
        }

        /**
         * 检查并刷新即将过期的缓存（播放时调用）
         * 如果缓存剩余时间少于5分钟，后台刷新缓存
         */
        async function checkAndRefreshCache(songId) {
            // 离线状态下不刷新缓存
            if (!isOnline) {
                return;
            }

            try {
                const key = CACHE_CONFIG.SONG_CACHE_PREFIX + songId;
                const data = localStorage.getItem(key);

                if (!data) return;

                const cache = JSON.parse(data);
                const now = Date.now();
                const remainingTime = CACHE_CONFIG.SONG_CACHE_DURATION - (now - cache.timestamp);
                const FIVE_MINUTES = 5 * 60 * 1000;

                // 如果剩余时间少于等于5分钟，后台刷新缓存
                if (remainingTime <= FIVE_MINUTES && remainingTime > 0) {
                    console.log(`歌曲 ${songId} 缓存即将过期（≤5分钟），后台刷新中...`);

                    try {
                        const currentSongInfo = playlistData.find(s => s.id === songId);
                        const songName = currentSongInfo ? currentSongInfo.name : '';
                        const apiUrl = getApiUrl(songId, 'exhigh', songName);
                        
                        if (!apiUrl) {
                            console.error(`[API] 无法获取歌曲 ${songId} 的API URL`);
                            return;
                        }
                        
                        const response = await axios.get(apiUrl, {
                            timeout: 10000
                        });

                        const parsedData = parseApiResponse(response, songId);
                        if (parsedData && parsedData.url) {
                            // 更新缓存
                            saveSongCacheToStorage(songId, {
                                url: parsedData.url,
                                name: parsedData.name,
                                artist: parsedData.artist,
                                pic: parsedData.pic,
                                duration: parsedData.duration,
                                album: parsedData.album || ""
                            });

                            console.log(`歌曲 ${songId} 缓存已刷新`);
                        }
                    } catch (error) {
                        console.error(`后台刷新缓存失败:`, error);
                    }
                }
            } catch (error) {
                console.error('检查缓存有效期失败:', error);
            }
        }

        /**
         * 清理已删除的歌曲信息（当歌曲从歌单中移除时调用）
         */
        function cleanupDeletedSongs() {
            try {
                // 保护: 如果 songIds 为空, 跳过清理(说明播放列表尚未加载完成)
                if (!songIds || songIds.length === 0) {
                    console.log('跳过清理: songIds 为空, 播放列表尚未加载');
                    return 0;
                }

                const currentIds = new Set(songIds);
                let deletedCount = 0;

                // 过滤内存中的播放列表数据
                const originalLength = playlistData.length;
                playlistData = playlistData.filter(song => {
                    if (currentIds.has(song.id)) {
                        return true;
                    } else {
                        deletedCount++;
                        return false;
                    }
                });

                // 重新计算索引
                playlistData.forEach((song, i) => {
                    song.index = i;
                });

                // 如果有删除，保存到JSON
                if (deletedCount > 0) {
                    savePlaylistToJSON();
                    console.log(`清理了 ${deletedCount} 首已删除的歌曲`);
                }

                return deletedCount;
            } catch (error) {
                console.error('清理已删除歌曲失败:', error);
                return 0;
            }
        }

        /**

        function addSongToPlaylistCache(songInfo) {
            try {
                // 检查是否已存在
                const existingIndex = playlistData.findIndex(s => s.id === songInfo.id);
                if (existingIndex >= 0) {
                    // 更新已有歌曲
                    playlistData[existingIndex] = songInfo;
                } else {
                    // 添加新歌曲
                    playlistData.push(songInfo);

                // 按索引排序
                playlistData.sort((a, b) => a.index - b.index);
                // 保存到JSON文件
                savePlaylistToJSON();
            } catch (error) {
                console.error('添加歌曲失败:', error);
            }
        }

        /**
         * 事件监听器管理器
         */
        const EventListenerManager = {
            listeners: [],

            /**
             * 添加事件监听器
             * @param {EventTarget} target - 事件目标
             * @param {string} event - 事件名称
             * @param {Function} handler - 事件处理函数
             * @param {Object} options - 事件选项
             */
            add: function(target, event, handler, options = {}) {
                if (!target || !event || typeof handler !== 'function') return;

                target.addEventListener(event, handler, options);
                this.listeners.push({ target, event, handler, options });
            },

            /**
             * 移除所有事件监听器
             */
            removeAll: function() {
                this.listeners.forEach(({ target, event, handler, options }) => {
                    try {
                        target.removeEventListener(event, handler, options);
                    } catch (e) {
                        console.error('移除事件监听器失败:', e);
                    }
                });
                this.listeners = [];
            },

            /**
             * 移除特定目标的所有事件监听器
             * @param {EventTarget} target - 事件目标
             */
            removeByTarget: function(target) {
                this.listeners = this.listeners.filter(listener => {
                    if (listener.target === target) {
                        try {
                            target.removeEventListener(listener.event, listener.handler, listener.options);
                        } catch (e) {
                            console.error('移除事件监听器失败:', e);
                        }
                        return false;
                    }
                    return true;
                });
            }
        };

        /**
         * 进度条触摸事件处理对象
         */
        const progressBarTouchHandler = {
            // 触摸开始
            start: (e) => {
                // 关键修复：原生播放器模式下不检查 player.paused，因为 player.src 可能未设置
                const isPlayerPaused = USE_NATIVE_PLAYER && nativePlayerInitialized 
                    ? !isPlaying  // 原生播放器模式下使用 isPlaying 状态
                    : player.paused;  // Web Audio 模式下使用 player.paused
                
                if (isLoading || totalDuration === 0 || isPlayerPaused || !isOnline) return;

                isDragging = true;
                dragStartTime = currentProgress;

                const touch = e.touches[0];
                const rect = progressContainer.getBoundingClientRect();
                lastDragPosition = (touch.clientX - rect.left) / rect.width;

                updateProgressPreviewFromTouch(touch);
                clearInterval(progressUpdateInterval);
            },

            // 触摸移动
            move: (e) => {
                if (!isDragging || isLoading || totalDuration === 0) return;

                const touch = e.touches[0];
                const rect = progressContainer.getBoundingClientRect();
                lastDragPosition = (touch.clientX - rect.left) / rect.width;
                lastDragPosition = Math.max(0, Math.min(1, lastDragPosition));

                updateProgressPreviewFromTouch(touch);
            },

            // 触摸结束
            end: () => {
                if (!isDragging) return;
                isDragging = false;

                const percent = Math.max(0, Math.min(1, lastDragPosition));

                if (totalDuration === 0) {
                    progressUpdateInterval = setInterval(updateProgress, 100);
                    return;
                }

                // 计算新位置（毫秒级）
                const newPositionMs = Math.floor(percent * totalDuration);
                
                // 关键修复：先更新currentProgress
                currentProgress = newPositionMs;
                
                // 使用原生播放器跳转
                if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                    nativeSeekTo(newPositionMs);
                    // 关键修复：原生播放器模式下不修改Web Audio的currentTime
                    // 避免两个播放器状态不一致
                } else {
                    // 使用Web Audio跳转
                    player.currentTime = newPositionMs / 1000;
                }

                updateProgress();
                
                // 强制同步到系统
                forceSyncMediaSession(newPositionMs / 1000);
                
                if (lyricsEnabled) updateLyricsDisplay();
                else lastKnownTime = currentProgress;

                // 恢复进度更新定时器
                progressUpdateInterval = setInterval(updateProgress, 100);
            }
        };

        /**
         * 更新进度条预览
         */
        function updateProgressPreviewFromTouch(touch) {
            const rect = progressContainer.getBoundingClientRect();
            let percent = (touch.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));

            progressBar.style.width = `${percent * 100}%`;

            // 计算预览时间（毫秒）
            const previewTimeMs = Math.floor(percent * totalDuration);
            currentTimeDisplay.textContent = formatTime(previewTimeMs / 1000);
        }

        /**
         * 播放/暂停处理函数
         */
        function handlePlayPause() {
            if (isLoading) return;
            
            // 关键修复：离线状态下检查是否有缓存
            if (!isOnline) {
                const currentSongId = currentPlayingSongId;
                const hasCache = currentSongId ? getSongCacheFromStorage(currentSongId) : null;
                if (!hasCache) {
                    showToast('当前无网络且无缓存，无法播放', 'warning', 2000);
                    return;
                }
            }

            if (!isInitialized) {
                playMusic();
                isInitialized = true;
                return;
            }

            try {
                // 使用原生播放器控制
                if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                    if (!isPlaying) {
                        // 关键修复：先检查网络状态
                        if (!isOnline && currentPlayingSongId) {
                            const hasCache = getSongCacheFromStorage(currentPlayingSongId);
                            if (!hasCache) {
                                showToast('当前歌曲无缓存，无法播放', 'warning', 2000);
                                return;
                            }
                        }
                        
                        // 关键修复：使用原生播放器恢复播放（而不是重新加载）
                        // 如果原生播放器已初始化且已准备完成，使用 resume 恢复播放
                        // 否则使用 play 重新加载并播放
                        let result;
                        if (nativePlayerInitialized) {
                            // 尝试使用 resume 恢复播放
                            result = nativeResume();
                            if (!result) {
                                // 如果 resume 失败，说明可能需要重新加载
                                console.warn("原生播放器 resume 失败，尝试重新加载");
                                result = nativePlay();
                            }
                        } else {
                            // 原生播放器未初始化，使用 play 初始化并播放
                            result = nativePlay();
                        }
                        
                        if (!result) {
                            console.error("原生播放器播放调用失败");
                            showToast('播放失败，请重试', 'error', 2000);
                            return;
                        }
                        // 关键修复：等待原生播放器回调确认播放状态
                        // isPlaying 将在 onNativePlayStateChanged 回调中设置
                        
                        // 播放时如果歌词按钮处于激活状态，并且歌词是因为暂停而被收缩的，则重新展开歌词容器
                        if (lyricsToggle.classList.contains('active') && lyricsCollapsedByPause) {
                            lyricsEnabled = true;
                            lyricsContainer.classList.add('show');
                            lyricsCollapsedByPause = false;
                        }
                    } else {
                        nativePause();
                        if (!player.paused) {
                            player.pause();
                        }
                        // isPlaying 将在 onNativePlayStateChanged 回调中设置

                        // 暂停时正确设置媒体会话状态
                        if ('mediaSession' in navigator) {
                            navigator.mediaSession.playbackState = "paused";
                        }

                        // 暂停时也进行一次最终同步，确保系统进度条准确
                        forceSyncMediaSession();

                        // 暂停时如果歌词容器是展开的，则收缩它，但保持按钮的active状态
                        if (lyricsEnabled) {
                            lyricsEnabled = false;
                            lyricsContainer.classList.remove('show');
                            lyricsCollapsedByPause = true; // 标记歌词是因为暂停而被收缩的
                        }
                    }
                } else {
                    // 使用Web Audio控制
                    if (player.paused) {
                        player.play().then(() => {
                            // 播放成功后启动同步机制
                            startSyncInterval();

                            // 播放时如果歌词按钮处于激活状态，并且歌词是因为暂停而被收缩的，则重新展开歌词容器
                            if (lyricsToggle.classList.contains('active') && lyricsCollapsedByPause) {
                                lyricsEnabled = true;
                                lyricsContainer.classList.add('show');
                                lyricsCollapsedByPause = false;
                            }
                        }).catch(error => {
                            console.error("播放失败:", error);
                            isPlaying = false;
                            updatePlayButtonUI();
                            showLoading提示("播放失败，请重试");
                            setTimeout(hideLoading提示, 2000);
                        });
                    } else {
                        player.pause();

                        // 暂停时停止同步定时器
                        stopSyncInterval();

                        // 暂停时正确设置媒体会话状态
                        if ('mediaSession' in navigator) {
                            navigator.mediaSession.playbackState = "paused";
                        }

                        // 暂停时也进行一次最终同步，确保系统进度条准确
                        forceSyncMediaSession();

                        // 暂停时如果歌词容器是展开的，则收缩它，但保持按钮的active状态
                        if (lyricsEnabled) {
                            lyricsEnabled = false;
                            lyricsContainer.classList.remove('show');
                            lyricsCollapsedByPause = true; // 标记歌词是因为暂停而被收缩的
                            // 注意：这里不再移除lyricsToggle的active类，保持按钮的激活状态
                        }
                    }
                }
            } catch (error) {
                console.error("播放控制出错:", error);
                isPlaying = false;
                updatePlayButtonUI();
                showLoading提示("操作失败，请重试");
                setTimeout(hideLoading提示, 2000);
            }
        }

        /**

        function playPreviousSong() {
            if (songIds.length === 0) return;
            if (isLoading) return;

            // 强制同步系统进度条到实际进度
            forceSyncMediaSession();

            // 重置网络状态相关变量
            offlineStartTime = 0;
            offlineDuration = 0;

            // 保留歌词容器状态，不再收缩

            let targetIndex;
            if (playMode === PlayMode.RANDOM) {
                // 随机模式下的上一首
                randomIndex = (randomIndex - 1 + randomQueue.length) % randomQueue.length;
                targetIndex = randomIndex;
            } else {
                // 其他模式下的上一首
                targetIndex = (currentIndex - 1 + songIds.length) % songIds.length;
            }

            cancelPendingRequest();
            clearRetryTimeout();
            loadAndPlaySong(targetIndex, 0);
        }

                return;
