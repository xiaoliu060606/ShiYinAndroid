    <!-- axios 内嵌完整实现 -->
    <script>
    (function() {
        var activeXhrs = [];
        
        function AxiosCancelToken(executor) {
            var token = this;
            token.promise = new Promise(function(resolve) {
                token.resolve = resolve;
            });
            if (executor) {
                executor(function() {
                    token.resolve();
                });
            }
        }
        
        AxiosCancelToken.prototype.throwIfRequested = function() {
            if (this.reason) {
                throw this.reason;
            }
        };
        
        AxiosCancelToken.source = function() {
            var cancel;
            var token = new AxiosCancelToken(function(c) {
                cancel = c;
            });
            return { token: token, cancel: cancel };
        };
        
        function axiosGet(url, config) {
            var timeout = (config && config.timeout) || 30000; // 增加到30秒
            var cancelToken = config && config.cancelToken;
            var maxRetries = (config && config.maxRetries) || 1; // 减少重试次数到1次
            var retryDelay = (config && config.retryDelay) || 2000; // 增加重试延迟到2秒
            var retryCount = 0;
            var lastError = null;

            function makeRequest() {
                return new Promise(function(resolve, reject) {
                    var xhr = new XMLHttpRequest();
                    xhr.open('GET', url, true);
                    xhr.timeout = timeout;

                    // 处理取消
                    if (cancelToken) {
                        cancelToken.promise.then(function() {
                            xhr.abort();
                            reject(new Error('Request canceled'));
                        });
                    }

                    xhr.onreadystatechange = function() {
                        if (xhr.readyState === 4) {
                            if (xhr.status >= 200 && xhr.status < 300) {
                                try {
                                    var data = JSON.parse(xhr.responseText);
                                    resolve({ data: data, status: xhr.status });
                                } catch(e) {
                                    reject(new Error('JSON Parse Error: ' + e.message));
                                }
                            } else if (xhr.status === 0) {
                                // xhr.status === 0 通常表示CORS错误或网络错误
                                // onerror应该会同时触发，但如果只触发这里，也要处理
                                var error = new Error('Network Error (CORS)');
                                error.isNetworkError = true;
                                error.isCorsError = true;
                                reject(error);
                            } else {
                                var error = new Error('HTTP Error: ' + xhr.status);
                                error.status = xhr.status;
                                reject(error);
                            }
                        }
                    };

                    xhr.onerror = function() {
                        var error = new Error('Network Error');
                        error.isNetworkError = true;
                        reject(error);
                    };

                    xhr.ontimeout = function() {
                        var error = new Error('Request Timeout');
                        error.isTimeout = true;
                        reject(error);
                    };

                    xhr.send();
                });
            }

            // 关键修复：使用指数退避算法进行重试
            function retry() {
                retryCount++;
                
                // 指数退避：1s, 2s, 4s, 8s... 最大 10 秒
                var delay = retryDelay * Math.pow(2, retryCount - 1);
                delay = Math.min(delay, 10000); // 最大延迟 10 秒
                
                if (retryCount <= maxRetries) {
                    console.log('[Axios] 请求重试 ' + retryCount + '/' + maxRetries + ':', url);
                    console.log('[Axios] 等待 ' + delay + 'ms 后重试');
                    return new Promise(function(resolve) {
                        setTimeout(function() {
                            makeRequest().then(resolve).catch(retry);
                        }, delay);
                    });
                } else {
                    // 重试耗尽，返回带有特殊标记的错误，保留最后一次错误信息
                    var finalError = new Error('Max retries exceeded');
                    finalError.maxRetriesExceeded = true;
                    finalError.lastError = lastError;
                    return Promise.reject(finalError);
                }
            }

            return makeRequest().catch(function(error) {
                lastError = error; // 记录最后一次错误
                
                console.log('[Axios] 捕获到错误:', error.message, 'isNetworkError:', error.isNetworkError, 'isCorsError:', error.isCorsError, 'status:', error.status);
                
                if (error.isNetworkError || error.isCorsError || error.isTimeout) {
                    return retry();
                }
                // 对于HTTP错误（502、503、504等），也进行重试
                if (error.status === 502 || error.status === 503 || error.status === 504) {
                    console.log('[Axios] 检测到服务器错误 (' + error.status + ')，进行重试');
                    return retry();
                }
                // 对于CORS错误（通常没有status但有特定的错误消息），也进行重试
                if (error.message && (error.message.includes('CORS') || error.message.includes('Network Error'))) {
                    console.log('[Axios] 检测到CORS/网络错误，进行重试');
                    return retry();
                }
                return Promise.reject(error);
            });
        }
        
        // 检查是否是取消错误
        function isCancel(error) {
            return error && error.message === 'Request canceled';
        }
        
        window.axios = {
            get: axiosGet,
            CancelToken: AxiosCancelToken,
            isCancel: isCancel
        };
    })();
    </script>

    <!-- 剪贴板访问控制 -->
    <script>
    (function() {
        // 剪贴板访问开关（默认启用）
        var clipboardEnabled = true;
        
        // 应用焦点状态检测
        var appHasFocus = true;
        
        // 监听页面可见性变化
        document.addEventListener('visibilitychange', function() {
            appHasFocus = !document.hidden;
            if (!appHasFocus) {
                console.log('[Clipboard] 应用进入后台，禁用剪贴板访问');
            } else {
                console.log('[Clipboard] 应用回到前台');
            }
        });

        // 启用剪贴板访问
        window.enableClipboardAccess = function() {
            clipboardEnabled = true;
            console.log('[Clipboard] 已启用');
        };

        // 禁用剪贴板访问
        window.disableClipboardAccess = function() {
            clipboardEnabled = false;
            console.log('[Clipboard] 已禁用');
        };

        // 安全复制到剪贴板
        window.copyToClipboard = function(text) {
            // 双重安全检查
            if (!clipboardEnabled || !appHasFocus) {
                console.warn('[Clipboard] 应用在后台或无焦点，无法访问剪贴板');
                return false;
            }
            
            // 检查文本长度限制（避免恶意操作）
            if (!text || text.length > 10000) {
                console.warn('[Clipboard] 文本内容无效或过长');
                return false;
            }
            
            // 优先使用 Android 原生桥接（最安全）
            if (window.AndroidBridge && typeof AndroidBridge.writeClipboard === 'function') {
                try {
                    var result = AndroidBridge.writeClipboard(text);
                    if (result) {
                        console.log('[Clipboard] 通过 Android 桥接复制成功');
                        return true;
                    }
                } catch (e) {
                    console.error('[Clipboard] Android 桥接复制失败:', e);
                }
            }
            
            // 降级方案：使用 document.execCommand
            try {
                var textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                textarea.style.left = '-9999px';
                textarea.setAttribute('readonly', '');
                document.body.appendChild(textarea);
                
                // 选择文本内容
                textarea.select();
                textarea.setSelectionRange(0, textarea.value.length);
                
                // 使用 document.execCommand
                var result = document.execCommand('copy');
                document.body.removeChild(textarea);
                
                if (result) {
                    console.log('[Clipboard] 通过 execCommand 复制成功');
                    return true;
                } else {
                    console.warn('[Clipboard] execCommand 复制失败');
                    return false;
                }
            } catch (e) {
                console.error('[Clipboard] 复制失败:', e);
                return false;
            }
        };

        // 安全读取剪贴板
        window.readClipboard = function(callback) {
            if (!clipboardEnabled || !appHasFocus) {
                console.warn('[Clipboard] 应用在后台或无焦点，无法访问剪贴板');
                callback(null);
                return;
            }
            
            // 优先使用 Android 原生桥接读取剪贴板
            if (window.AndroidBridge && typeof AndroidBridge.readClipboard === 'function') {
                try {
                    var clipboardText = AndroidBridge.readClipboard();
                    callback(clipboardText);
                } catch (e) {
                    console.error('[Clipboard] Android 桥接读取失败:', e);
                    callback(null);
                }
            } else {
                // 降级方案：WebView 中无法安全读取剪贴板内容
                console.warn('[Clipboard] 无法读取剪贴板内容，请使用 Android 原生功能');
                callback(null);
            }
        };
    })();
    </script>

        @keyframes pulse {
            0% {
                transform: scale(0.95);

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(255, 193, 7, 0);

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 193, 7, 0);

                        playlistData = data.songs.map((song, index) => ({
                            id: song.id,
                            index: index,
                            name: song.name || '未知歌曲',
                            artist: song.artist || '未知歌手',
                            pic: song.pic || defaultCover
                        }));
                        isPlaylistLoaded = true;
                        console.log('从 Android 加载播放列表:', data.songs.length, '首歌曲');
                        return data.songs;

                if (!response.ok) {
                    throw new Error('无法加载播放列表');

                const data = await response.json();
                playlistJsonData = data;
                if (data.songs && Array.isArray(data.songs)) {
                    songIds = data.songs.map(song => song.id);
                    // 同时加载到 playlistData
                    playlistData = data.songs.map((song, index) => ({
                        id: song.id,
                        index: index,
                        name: song.name || '未知歌曲',

                    console.log('从默认文件加载播放列表:', data.songs.length, '首歌曲');
                    return data.songs;

            return [];

                        artist: song ? song.artist : '',
                        pic: song ? song.pic : defaultCover

                const jsonStr = JSON.stringify(playlistJsonData, null, 2);

                // 下载JSON文件

            }

            currentApiIndex = newApiIndex;

            const api = API_SERVERS[currentApiIndex] || API_SERVERS[0];
            
            let url = '';
            
            if (api.mode === 'id') {

                url = `${api.url}?id=${songId}&type=json&level=${level}`;
            } else if (api.mode === 'search') {

                    url = `${api.url}?word=${encodeURIComponent(songName)}`;

            } else {

                url = `${api.url}?id=${songId}&type=json&level=${level}`;

        // 统一解析API响应数据（支持不同API格式）
        function parseApiResponse(response, songId) {
            const api = API_SERVERS[currentApiIndex] || API_SERVERS[0];

            // 处理两种可能的响应格式
            // 格式1: {"code": 200, "data": {...}} (原生接口返回)
            // 格式2: {"data": {"code": 200, "data": {...}}} (axios返回)
            const responseCode = response.code || (response.data && response.data.code);
            const rawData = response.data && response.data.data ? response.data.data : (response.data || response);

            if (!response.data || responseCode !== 200 || !rawData) {
                return null;
            }
            
            // 根据不同API格式解析数据
            if (api.name === 'vkeys') {
                // vkeys API格式：
                // {
                //   "code": 200,
                //   "data": {
                //     "id": 1371627538,
                //     "song": "勾指起誓",
                //     "singer": "葛雨晴",
                //     "album": "勾指起誓",
                //     "cover": "http://...",
                //     "url": "http://...",
                //     "interval": "3分3秒",
                //     "kbps": "320kbps"
                //   }
                // }
                return {
                    id: rawData.id || songId,
                    name: rawData.song || '未知歌曲',
                    artist: rawData.singer || '未知歌手',
                    album: rawData.album || '',
                    pic: rawData.cover || defaultCover,
                    url: rawData.url || '',
                    duration: parseIntervalToSeconds(rawData.interval) * 1000, // 转换为毫秒
                    br: parseKbpsToNumber(rawData.kbps) // 转换为比特率数字
                };
            } else {
                // cenguigui API格式（默认）：
                // {
                //   "code": 200,
                //   "data": {
                //     "id": 123,
                //     "name": "歌曲名",
                //     "artist": "歌手",
                //     "pic": "http://...",
                //     "url": "http://...",
                //     "duration": 180000,
                //     "br": 320000
                //   }
                // }
                return {
                    id: rawData.id || songId,
                    name: rawData.name || '未知歌曲',
                    artist: rawData.artist || '未知歌手',
                    album: rawData.album || '',
                    pic: rawData.pic || defaultCover,
                    url: rawData.url || '',
                    duration: rawData.duration || 0,
                    br: rawData.br || 0
                };
            }
        }
        
        // 辅助函数：解析时间字符串（如"3分3秒"）为秒数
        function parseIntervalToSeconds(interval) {
            if (!interval) return 0;
            
            let seconds = 0;
            const minuteMatch = interval.match(/(\d+)分/);
            const secondMatch = interval.match(/(\d+)秒/);
            
            if (minuteMatch) {
                seconds += parseInt(minuteMatch[1]) * 60;
            }
            if (secondMatch) {
                seconds += parseInt(secondMatch[1]);
            }
            
            return seconds || 0;
        }
        
        // 辅助函数：解析比特率字符串（如"320kbps"）为数字
        function parseKbpsToNumber(kbps) {
            if (!kbps) return 0;
            
            const match = kbps.match(/(\d+)/);
            return match ? parseInt(match[1]) * 1000 : 0; // 转换为比特率
        }

        /**

        function initBackgroundStateMonitoring() {

        /**
         * 检查后台音频状态 - 优化：增强后台播放稳定性
         */
        function checkBackgroundAudioState() {
            // 如果不在后台或没有播放，不需要检查
            if (!isInBackground || !isPlaying) return;

            const now = Date.now();
            // 避免过于频繁的检查
            if (now - lastAudioStateCheck < 2000) return;

            lastAudioStateCheck = now;

            // 关键修复：原生播放器模式下跳过Web Audio状态检查
            if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                // 原生播放器模式下，依赖原生播放器的回调来同步状态
                // 不需要检查 player.paused，因为 player.src 可能未设置
                return;
            }
            
            // 检查音频元素状态与实际播放状态是否一致（仅Web Audio模式）
            if (isPlaying && player.paused) {
                console.log("检测到音频状态不同步：正在播放但音频已暂停");

                // 尝试恢复播放 - 优化：增加恢复策略
                if (backgroundPlayAttempts < MAX_BACKGROUND_PLAY_ATTEMPTS) {
                    backgroundPlayAttempts++;
                    console.log(`尝试恢复播放 (${backgroundPlayAttempts}/${MAX_BACKGROUND_PLAY_ATTEMPTS})`);

                    // 优化：先检查网络状态，如果网络不好，先等待网络恢复
                    if (!isOnline) {
                        console.log("网络未连接，等待网络恢复...");
                        return;
                    }

                    // 优化：先检查音频元素的readyState
                    if (player.readyState < player.HAVE_FUTURE_DATA) {
                        console.log("音频数据不足，先尝试加载更多数据");
                        // 尝试预加载更多数据
                        player.load();
                        setTimeout(() => {
                            // 延迟后再次尝试播放
                            if (isInBackground && isPlaying && player.paused) {
                                player.play().catch(error => {
                                    console.error("延迟播放恢复失败:", error);
                                    if (backgroundPlayAttempts >= MAX_BACKGROUND_PLAY_ATTEMPTS) {
                                        reloadCurrentSong();
                                    }
                                });
                            }
                        }, 1000);
                        return;
                    }

                    player.play().then(() => {
                        console.log("后台播放恢复成功");
                        backgroundPlayAttempts = 0;
                        forceSyncMediaSession();
                    }).catch(error => {
                        console.error("后台播放恢复失败:", error);

                        // 如果多次尝试失败，重新加载当前歌曲
                        if (backgroundPlayAttempts >= MAX_BACKGROUND_PLAY_ATTEMPTS) {
                            console.log("多次恢复失败，重新加载当前歌曲");
                            reloadCurrentSong();
                        }
                    });
                }
            } else if (isPlaying && !player.paused && now - lastRealTimeUpdate > 10000) {
                // 优化：延长检查间隔，避免过于频繁的检查（10秒无更新才检查）
                console.log("长时间没有timeupdate事件，检查播放状态");
                const currentTime = player.currentTime;

                // 延迟2秒后再次检查，如果时间没有变化，则认为播放卡住
                setTimeout(() => {
                    if (isInBackground && isPlaying && !player.paused && player.currentTime === currentTime) {
                        console.log("检测到播放卡住，尝试恢复");
                        // 轻微调整播放位置来尝试恢复播放
                        player.currentTime = Math.min(currentTime + 0.1, player.duration || currentTime + 0.1);
                        player.play().catch(error => {
                            console.error("尝试恢复卡住的播放失败:", error);
                        });
                    }
                }, 2000);
            }
        }

        /**
         * 费雪-耶茨洗牌算法 - 生成随机播放队列
         */
        function fisherYatesShuffle(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        /**
         * 初始化随机播放队列
         */
        function initRandomQueue() {
            randomQueue = fisherYatesShuffle(songIds);
            // 将当前歌曲移到队列第一位
            const currentSongId = playMode === PlayMode.RANDOM ? randomQueue[randomIndex] || sui : sui;
            const currentPos = randomQueue.indexOf(currentSongId);
            if (currentPos >= 0 && currentPos > 0) {
                // 移除当前位置并插入到开头
                randomQueue.splice(currentPos, 1);
                randomQueue.unshift(currentSongId);
            } else if (currentPos < 0) {
                // 当前歌曲不在队列中，添加到开头
                randomQueue.unshift(currentSongId);
            }
            randomIndex = 0;
        }

        /**
         * 初始化随机播放队列（保持当前播放歌曲）
         * 用于从其他模式切换到随机播放时
         */
        function initRandomQueueWithCurrentSong() {
            // 获取当前正在播放的歌曲ID（优先使用currentPlayingSongId）
            let currentSongId = currentPlayingSongId;

            // 如果没有currentPlayingSongId，根据当前模式获取
            if (!currentSongId) {
                if (playMode === PlayMode.RANDOM && randomQueue.length > 0) {
                    currentSongId = randomQueue[randomIndex];
                } else {
                    currentSongId = songIds[currentIndex];
                }
            }

            // 生成新的随机队列
            randomQueue = fisherYatesShuffle(songIds);

            // 只有当当前歌曲在播放列表中时才调整位置
            const currentPos = randomQueue.indexOf(currentSongId);
            if (currentPos >= 0) {
                // 将当前播放歌曲移到队列第一位
                if (currentPos > 0) {
                    randomQueue.splice(currentPos, 1);
                    randomQueue.unshift(currentSongId);
                }
                // 重置randomIndex为0（当前歌曲在第一位）
                randomIndex = 0;
            } else {
                // 当前歌曲不在播放列表中（如搜索的歌曲），保持randomIndex为0
                randomIndex = 0;
                console.log('当前播放歌曲不在播放列表中，使用播放列表第一首');
            }

            console.log('随机队列已生成，当前播放歌曲:', currentSongId, '位置:', randomIndex);
        }

        /**

        function togglePlayMode() {
            // 循环切换3种模式：顺序播放 -> 单曲循环 -> 随机播放
            playMode = (playMode + 1) % 3;

            // 更新模式图标和提示
            switch (playMode) {
                case PlayMode.SEQUENTIAL:
                    modeIcon.className = "fa-solid fa-repeat";
                    modeToggle.classList.remove('active');
                    modeToggle.title = "顺序播放";
                    showModeToast("顺序播放");
                    // 从随机模式切回顺序模式时，同步currentIndex到当前播放歌曲
                    if (randomQueue.length > 0 && randomIndex >= 0) {
                        const currentSongId = randomQueue[randomIndex];
                        const correctIndex = songIds.indexOf(currentSongId);
                        if (correctIndex >= 0) {
                            currentIndex = correctIndex;
                        }
                    }
                    break;
                case PlayMode.SINGLE_LOOP:
                    modeIcon.className = "fa-solid fa-rotate";
                    modeToggle.classList.remove('active');
                    modeToggle.title = "单曲循环";
                    showModeToast("单曲循环");
                    break;
                case PlayMode.RANDOM:
                    modeIcon.className = "fa-solid fa-random";
                    modeToggle.classList.remove('active');
                    modeToggle.title = "随机播放";
                    showModeToast("随机播放");
                    // 重新生成随机队列，保持当前播放歌曲的位置
                    initRandomQueueWithCurrentSong();
                    break;
            }

            // 关键修复：如果当前有歌曲在播放且歌词已开启，重新加载当前歌曲的歌词
            if (isInitialized && lyricsEnabled) {
                loadLyricsForCurrentSong();

            // 更新播放列表显示
            updatePlaylistModeDisplay();
            updatePlaylistCurrentInfo();
            renderPlaylist();
        }

            window.addEventListener('online', handleNetworkOnline);
            window.addEventListener('offline', handleNetworkOffline);

            // 启动网络质量检测定时器
            networkQualityTimer = setInterval(checkNetworkQuality, QUALITY_CHECK_INTERVAL);

            // 初始化进行一次网络质量检测
            checkNetworkQuality();

            // 监听歌曲结束事件，准备预加载下一首
            player.addEventListener('ended', () => {
                // 当歌曲即将结束时，预加载下一首
                if (isOnline && !isPreloading) {
                    preloadNextSongs();
                }
            });
        }

        /**
         * 页面加载时检查网络状态
         */
        function checkNetworkOnLoad() {
            // 检查网络状态
            if (!navigator.onLine) {
                console.log('页面加载时无网络连接');
                isOnline = false;
                updateNetworkIndicator();
                
                // 显示离线提示
                showToast('当前无网络连接，将使用缓存歌曲', 'warning', 3000);
                
                // 检查是否有缓存歌曲可用
                const cachedSongs = getAvailableCachedSongs();
                if (cachedSongs.length === 0) {
                    showToast('暂无缓存歌曲，请连接网络后使用', 'error', 5000);
                } else {
                    showToast(`有 ${cachedSongs.length} 首缓存歌曲可用`, 'info', 3000);
                }
            } else {
                console.log('页面加载时网络连接正常');
                // 检查网络质量
                checkNetworkQuality();
            }
        }

        /**
         * 获取可用的缓存歌曲列表
         */
        function getAvailableCachedSongs() {
            const cachedSongs = [];
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith(CACHE_CONFIG.SONG_CACHE_PREFIX)) {
                        try {
                            const data = localStorage.getItem(key);
                            if (data) {
                                const cache = JSON.parse(data);
                                // 检查缓存是否过期
                                if (Date.now() - cache.timestamp < CACHE_CONFIG.SONG_CACHE_DURATION) {
                                    cachedSongs.push({
                                        id: key.replace(CACHE_CONFIG.SONG_CACHE_PREFIX, ''),
                                        name: cache.name,
                                        artist: cache.artist,
                                        timestamp: cache.timestamp
                                    });
                                }
                            }
                        } catch (e) {
                            // 解析失败，跳过
                        }
                    }
                }
            } catch (error) {
                console.error('获取缓存歌曲失败:', error);
            }
            return cachedSongs;
        }

        /**
         * 根据网络质量调整播放策略
         */
        function adjustPlaybackStrategy() {
            // 根据网络质量调整预加载策略
            switch (networkQuality) {
                case 'excellent':
                    // 优秀网络，预加载下2首歌曲
                    maxPreloadCount = 2;
                    break;
                case 'good':
                    // 良好网络，预加载下1首歌曲
                    maxPreloadCount = 1;
                    break;
                case 'fair':
                    // 一般网络，仅在播放当前歌曲一半时预加载下一首
                    maxPreloadCount = 1;
                    preloadThreshold = 0.5;
                    break;
                case 'poor':
                    // 较差网络，不主动预加载
                    maxPreloadCount = 0;
                    break;
            }
        }

        /**
         * 检测网络质量
         */
        function checkNetworkQuality() {
            // 如果网络离线，跳过检测
            if (!isOnline) {
                networkQuality = 'poor';
                return;
            }

            // 使用navigator.connection API获取网络信息（如果可用）
            if (navigator.connection) {
                const connection = navigator.connection;

                // 根据网络类型和有效带宽评估网络质量
                if (connection.type === 'wifi' || connection.type === 'ethernet') {
                    networkQuality = 'excellent';
                } else if (connection.type === '4g') {
                    networkQuality = 'good';
                } else if (connection.type === '3g') {
                    networkQuality = 'fair';
                } else {
                    networkQuality = 'poor';
                }

                // 考虑网络下行速度
                if (connection.downlink !== undefined) {
                    downloadSpeed = (connection.downlink * 125); // 转换为KB/s

                    // 根据下行速度调整网络质量评估
                    if (downloadSpeed < 200) networkQuality = 'poor';
                    else if (downloadSpeed < 500) networkQuality = 'fair';
                    else if (downloadSpeed < 2000) networkQuality = 'good';
                    else networkQuality = 'excellent';
                }
            } else {
                // 如果没有connection API，我们尝试通过快速请求估算网络质量
                estimateNetworkQuality();
            }

            // 记录网络质量检查时间
            lastQualityCheck = Date.now();
            // console.log(`网络质量: ${networkQuality}, 估计下载速度: ${downloadSpeed.toFixed(1)} KB/s`);

            // 根据网络质量调整播放策略
            adjustPlaybackStrategy();

            // 更新网络指示器颜色
            updateNetworkIndicator();
        }

        /**
         * 估算网络质量
         */
        function estimateNetworkQuality() {
            const startTime = performance.now();
            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'https://api.music.163.com/api/v3/search/pc?keywords=test', true);
            xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');

            xhr.timeout = 3000;

            xhr.onload = function () {
                if (xhr.status === 200) {
                    const duration = performance.now() - startTime;
                    const responseSize = xhr.responseText.length;
                    downloadSpeed = (responseSize / 1024) / (duration / 1000);

                    // 根据响应时间和下载速度评估网络质量
                    if (duration < 300 && downloadSpeed > 1000) {
                        networkQuality = 'excellent';
                    } else if (duration < 800 && downloadSpeed > 500) {
                        networkQuality = 'good';
                    } else if (duration < 1500 && downloadSpeed > 200) {
                        networkQuality = 'fair';
                    } else {
                        networkQuality = 'poor';
                    }

                    // 调整播放策略
                    adjustPlaybackStrategy();
                    updateNetworkIndicator();
                }
            };

            xhr.ontimeout = xhr.onerror = function () {
                networkQuality = 'poor';
                downloadSpeed = 0;
                adjustPlaybackStrategy();
                updateNetworkIndicator();
            };

            xhr.send();
        }

        /**
         * 处理网络在线事件
         */
        function handleNetworkOnline() {
            if (!isOnline) {
                isOnline = true;
                updateNetworkIndicator();

                if (offlineStartTime > 0) {
                    offlineDuration = Date.now() - offlineStartTime;
                    offlineStartTime = 0;

                    // 记录网络恢复信息
                    console.log(`网络恢复，离线时间: ${Math.round(offlineDuration / 1000)}秒`);

                    // 如果离线时间较长，显示提示信息
                    if (offlineDuration > 30000) { // 30秒以上
                        showLoading提示(`网络恢复，离线${Math.round(offlineDuration / 1000)}秒`);
                        setTimeout(hideLoading提示, 2000);
                    }

                    // 关键修复：根据播放器类型选择正确的进度源
                    if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                        // 原生播放器模式下，currentProgress 已由回调更新
                        updateProgress();
                        forceSyncMediaSession();
                    } else {
                        // Web Audio 模式下使用音频元素的真实时间
                        const actualProgress = Math.floor(player.currentTime * 1000);
                        currentProgress = actualProgress;
                        updateProgress();
                        forceSyncMediaSession();
                    }

                    if (lyricsEnabled) updateLyricsDisplay();
                }

                // 重置网络中断计数
                networkInterruptionCount = 0;

                // 立即进行一次网络质量检查
                checkNetworkQuality();

                // 网络恢复后尝试恢复播放（仅Web Audio模式）
                if (!USE_NATIVE_PLAYER && isPlaying && player.paused) {
                    // 尝试断点续传
                    attemptResumePlayback();
                }

                // 恢复预加载
                if (preloadQueue.length > 0 && !isPreloading) {
                    console.log("恢复预加载队列");
                    processPreloadQueue();
                }
            }
        }

        /**
         * 尝试恢复播放（断点续传）
         */
        function attemptResumePlayback() {
            const now = Date.now();

            // 防止频繁尝试恢复播放
            if (now - lastResumeAttempt < MIN_RESUME_INTERVAL) {
                return;
            }

            lastResumeAttempt = now;
            console.log("尝试断点续传播放...");

            // 记录恢复位置
            const resumePosition = player.currentTime;

            // 优化：先尝试直接播放，避免不必要的重新加载
            if (player.readyState >= player.HAVE_CURRENT_DATA) {
                console.log("音频数据足够，直接尝试播放");

                // 设置恢复位置
                if (resumePosition > 0) {
                    player.currentTime = resumePosition;
                }

                player.play().then(() => {
                    console.log("断点续传成功");
                    startSyncInterval();
                }).catch(error => {
                    console.error("直接播放失败，尝试预加载:", error);

                    // 如果直接播放失败，尝试预加载更多数据
                    if (player.readyState < player.HAVE_ENOUGH_DATA) {
                        console.log("音频数据不足，尝试预加载更多数据");
                        player.load();

                        // 延迟后再次尝试播放
                        setTimeout(() => {
                            if (isOnline && isPlaying && player.paused) {
                                player.play().then(() => {
                                    console.log("预加载后播放成功");
                                    startSyncInterval();
                                }).catch(error => {
                                    console.error("预加载后播放失败:", error);
                                    // 最后尝试重新加载当前歌曲
                                    reloadCurrentSongWithResume();
                                });
                            }
                        }, 1500);
                    } else {
                        // 尝试重新加载当前歌曲
                        reloadCurrentSongWithResume();
                    }
                });
            } else {
                console.log("音频数据不足，先尝试预加载更多数据");

                // 尝试从当前位置加载
                player.load();

                // 延迟后再次尝试播放
                setTimeout(() => {
                    if (isOnline && isPlaying && player.paused) {
                        // 设置恢复位置
                        if (resumePosition > 0) {
                            player.currentTime = resumePosition;
                        }

                        player.play().then(() => {
                            console.log("断点续传成功");
                            startSyncInterval();
                        }).catch(error => {
                            console.error("延迟恢复播放失败:", error);
                            // 尝试重新加载当前歌曲
                            reloadCurrentSongWithResume();
                        });
                    }
                }, 2000);
            }
        }

        /**
         * 重新加载当前歌曲并尝试恢复到之前的位置
         */
        function reloadCurrentSongWithResume() {
            // 保存当前播放位置
            const currentPos = player.currentTime;
            console.log(`重新加载歌曲，尝试从${currentPos.toFixed(1)}秒恢复`);

            showLoading提示("正在恢复播放...");

            // 如果当前有歌曲正在播放，重新加载它
            if (currentPlayingSongId) {
                let targetIndex;
                if (playMode === PlayMode.RANDOM) {
                    targetIndex = randomIndex;
                } else {
                    targetIndex = currentIndex;
                }

                // 使用当前位置作为恢复点
                loadAndPlaySong(targetIndex, 0, currentPos);
            } else {
                // 如果没有正在播放的歌曲，2秒后自动隐藏加载提示
                setTimeout(hideLoading提示, 2000);
            }
        }

        /**
         * 处理网络离线事件
         */
        function handleNetworkOffline() {
            if (isOnline) {
                isOnline = false;
                offlineStartTime = Date.now();
                updateNetworkIndicator();

                // 增加网络中断计数
                networkInterruptionCount++;
                console.log(`网络中断 (第${networkInterruptionCount}次)`);

                // 关键修复：原生播放器模式下不处理Web Audio的网络事件
                if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                    // 原生播放器模式下，网络状态由原生层处理
                    return;
                }

                // 检查当前播放的歌曲是否有缓存
                const currentSongId = currentPlayingSongId;
                const hasCache = currentSongId ? getSongCacheFromStorage(currentSongId) : null;
                
                if (!isLoading && isPlaying) {
                    if (hasCache) {
                        // 如果有缓存，继续播放，不暂停
                        console.log("网络断开，但有缓存，继续播放");
                        showToast('网络已断开，使用缓存继续播放', 'info', 2000);
                    } else {
                        console.log("网络断开，无缓存，暂停播放");
                        // 保存恢复位置
                        resumePosition = player.currentTime;
                        // 关键修复：在暂停前先保存真实的播放进度
                        currentProgress = Math.floor(player.currentTime * 1000);
                        player.pause();
                        clearInterval(progressUpdateInterval);
                        // 强制更新进度条以反映真实进度
                        updateProgress();
                        // 同步媒体会话状态
                        forceSyncMediaSession();
                        // 显示离线提示
                        showToast('网络已断开，暂无缓存', 'warning', 2000);
                    }
                }

                // 取消所有预加载请求
                cancelPreloadRequests();
            }
        }

        /**
         * 取消所有预加载请求
         */
        function cancelPreloadRequests() {
            if (preloadRequests && preloadRequests.length > 0) {
                preloadRequests.forEach(request => {
                    if (request && typeof request.abort === 'function') {
                        request.abort();
                        console.log("取消预加载请求");
                    }
                });
                preloadRequests = [];
            }
            isPreloading = false;
        }

        /**
         * 处理预加载队列
         */
        function processPreloadQueue() {
            if (isPreloading || !isOnline || preloadQueue.length === 0) {
                return;
            }

            isPreloading = true;
            console.log("开始处理预加载队列");

            // 清理过期缓存
            cleanupPreloadCache();

            // 从队列中取出要预加载的歌曲
            const songToPreload = preloadQueue.shift();

            // 检查是否已经在缓存中
            if (preloadCache.has(songToPreload.id)) {
                const cachedItem = preloadCache.get(songToPreload.id);
                // 检查缓存是否有效
                if (Date.now() - cachedItem.timestamp < CACHE_EXPIRE_TIME) {
                    console.log(`歌曲 ${songToPreload.id} 已在缓存中`);
                    isPreloading = false;
                    // 继续处理队列中的下一首歌曲
                    if (preloadQueue.length > 0) {
                        setTimeout(processPreloadQueue, 100);
                    }
                    return;
                }
            }

            // 预加载歌曲
            preloadSong(songToPreload);
        }

        /**
         * 预加载单个歌曲
         */
        function preloadSong(song) {
            if (!song || !song.id) {
                isPreloading = false;
                if (preloadQueue.length > 0) {
                    setTimeout(processPreloadQueue, 100);
                }
                return;
            }

            console.log(`开始预加载歌曲: ${song.id}`);

            // 创建一个取消令牌
            const cancelTokenSource = axios.CancelToken.source();

            // 保存请求取消令牌
            preloadRequests.push(cancelTokenSource);

            // 使用动态API获取歌曲信息
            const apiUrl = getApiUrl(song.id, 'exhigh');
            axios.get(apiUrl, {
                cancelToken: cancelTokenSource.token,
                timeout: 30000
            })
                .then(res => {
                    // 从缓存中移除已完成的请求
                    preloadRequests = preloadRequests.filter(req => req !== cancelTokenSource);

                    const songData = parseApiResponse(res, song.id);
                    
                    if (songData && songData.url) {
                        // 获取到了有效URL，直接缓存，不再使用Audio对象
                        const songUrl = songData.url;

                        // 直接缓存API返回的URL信息
                        preloadCache.set(song.id, {
                            url: songUrl,
                            timestamp: Date.now(),
                            // 尝试从API响应中获取时长信息
                            duration: res.data.data.duration ? parseDuration(res.data.data.duration) : 0
                        });

                        console.log(`歌曲 ${song.id} 信息已缓存`);

                        // 检查缓存大小并在需要时清理
                        if (preloadCache.size > MAX_PRELOAD_SIZE) {
                            cleanupOldestCache();
                        }
                    } else {
                        console.error(`预加载歌曲 ${song.id} 失败: API返回无效数据`);
                    }

                    isPreloading = false;

                    // 继续处理队列中的下一首歌曲
                    if (preloadQueue.length > 0) {
                        setTimeout(processPreloadQueue, 100);
                    }
                })
                .catch(error => {
                    // 从缓存中移除已取消的请求
                    preloadRequests = preloadRequests.filter(req => req !== cancelTokenSource);

                    if (!axios.isCancel(error)) {
                        console.error(`预加载歌曲 ${song.id} 失败:`, error);
                    }

                    isPreloading = false;

                    // 继续处理队列中的下一首歌曲
                    if (preloadQueue.length > 0) {
                        setTimeout(processPreloadQueue, 100);
                    }
                });
        }

        /**
         * 解析时长字符串为秒数
         */
        function parseDuration(durationStr) {
            if (!durationStr || typeof durationStr !== 'string') return 0;

            const parts = durationStr.split(':');
            if (parts.length < 2) return 0;

            const minutes = parseInt(parts[0], 10);
            const seconds = parseInt(parts[1], 10);

            if (isNaN(minutes) || isNaN(seconds)) return 0;

            return minutes * 60 + seconds;
        }

        /**
         * 缓存管理器 - 统一管理所有类型的缓存
         */
        const CacheManager = {
            /**
             * 获取缓存大小（字节）
             */
            getCacheSize: function() {
                let totalSize = 0;
                try {
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        if (key && (key.startsWith(CACHE_CONFIG.SONG_CACHE_PREFIX) ||
                                     key.startsWith(CACHE_CONFIG.LYRIC_CACHE_PREFIX) ||
                                     key.startsWith(CACHE_CONFIG.IMAGE_CACHE_PREFIX))) {
                            const value = localStorage.getItem(key);
                            if (value) {
                                totalSize += value.length * 2; // UTF-16编码，每个字符2字节
                            }
                        }
                    }
                } catch (e) {
                    console.error('计算缓存大小失败:', e);
                }
                return totalSize;
            },

            /**
             * 清理过期缓存
             */
            cleanupExpiredCache: function() {
                const now = Date.now();
                let deletedCount = 0;

                try {
                    // 清理歌曲缓存
                    for (let i = localStorage.length - 1; i >= 0; i--) {
                        const key = localStorage.key(i);
                        if (!key) continue;

                        if (key.startsWith(CACHE_CONFIG.SONG_CACHE_PREFIX)) {
                            try {
                                const data = localStorage.getItem(key);
                                if (data) {
                                    const cache = JSON.parse(data);
                                    if (now - cache.timestamp > CACHE_CONFIG.SONG_CACHE_DURATION) {
                                        localStorage.removeItem(key);
                                        deletedCount++;
                                    }
                                }
                            } catch (e) {
                                console.error('清理歌曲缓存失败:', e);
                            }
                        } else if (key.startsWith(CACHE_CONFIG.LYRIC_CACHE_PREFIX)) {
                            try {
                                const data = localStorage.getItem(key);
                                if (data) {
                                    const cache = JSON.parse(data);
                                    if (now - cache.timestamp > CACHE_CONFIG.LYRIC_CACHE_DURATION) {
                                        localStorage.removeItem(key);
                                        deletedCount++;
                                    }
                                }
                            } catch (e) {
                                console.error('清理歌词缓存失败:', e);
                            }
                        } else if (key.startsWith(CACHE_CONFIG.IMAGE_CACHE_PREFIX)) {
                            try {
                                const data = localStorage.getItem(key);
                                if (data) {
                                    const cache = JSON.parse(data);
                                    if (now - cache.timestamp > CACHE_CONFIG.IMAGE_CACHE_DURATION) {
                                        localStorage.removeItem(key);
                                        deletedCount++;
                                    }
                                }
                            } catch (e) {
                                console.error('清理图片缓存失败:', e);
                            }
                        }
                    }

                    if (deletedCount > 0) {
                        console.log(`[Cache] 清理了 ${deletedCount} 个过期缓存项`);
                    }
                } catch (e) {
                    console.error('清理过期缓存失败:', e);
                }

                return deletedCount;
            },

            /**
             * 清理缓存直到大小限制
             */
            cleanupToSizeLimit: function() {
                const currentSize = this.getCacheSize();
                if (currentSize <= CACHE_CONFIG.MAX_CACHE_SIZE) {
                    return 0;
                }

                let deletedCount = 0;
                const cacheItems = [];

                try {
                    // 收集所有缓存项
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        if (key && (key.startsWith(CACHE_CONFIG.SONG_CACHE_PREFIX) ||
                                     key.startsWith(CACHE_CONFIG.LYRIC_CACHE_PREFIX) ||
                                     key.startsWith(CACHE_CONFIG.IMAGE_CACHE_PREFIX))) {
                            const value = localStorage.getItem(key);
                            if (value) {
                                const cache = JSON.parse(value);
                                cacheItems.push({
                                    key: key,
                                    timestamp: cache.timestamp,
                                    size: value.length * 2
                                });
                            }
                        }
                    }

                    // 按时间排序，删除最旧的
                    cacheItems.sort((a, b) => a.timestamp - b.timestamp);

                    let totalSize = currentSize;
                    for (const item of cacheItems) {
                        if (totalSize <= CACHE_CONFIG.MAX_CACHE_SIZE) {
                            break;
                        }
                        localStorage.removeItem(item.key);
                        totalSize -= item.size;
                        deletedCount++;
                    }

                    if (deletedCount > 0) {
                        console.log(`[Cache] 清理了 ${deletedCount} 个缓存项以节省空间`);
                    }
                } catch (e) {
                    console.error('清理缓存到大小限制失败:', e);
                }

                return deletedCount;
            },

            /**
             * 获取缓存统计信息
             */
            getCacheStats: function() {
                let songCount = 0;
                let lyricCount = 0;
                let imageCount = 0;
                let totalSize = 0;

                try {
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        if (!key) continue;

                        const value = localStorage.getItem(key);
                        if (!value) continue;

                        if (key.startsWith(CACHE_CONFIG.SONG_CACHE_PREFIX)) {
                            songCount++;
                        } else if (key.startsWith(CACHE_CONFIG.LYRIC_CACHE_PREFIX)) {
                            lyricCount++;
                        } else if (key.startsWith(CACHE_CONFIG.IMAGE_CACHE_PREFIX)) {
                            imageCount++;
                        }

                        if (key.startsWith(CACHE_CONFIG.SONG_CACHE_PREFIX) ||
                            key.startsWith(CACHE_CONFIG.LYRIC_CACHE_PREFIX) ||
                            key.startsWith(CACHE_CONFIG.IMAGE_CACHE_PREFIX)) {
                            totalSize += value.length * 2;
                        }
                    }
                } catch (e) {
                    console.error('获取缓存统计失败:', e);
                }

                return {
                    songCount,
                    lyricCount,
                    imageCount,
                    totalSize,
                    totalSizeMB: (totalSize / (1024 * 1024)).toFixed(2)
                };
            }
        };

        /**
         * 清理过期缓存
         */
        function cleanupPreloadCache() {
            const now = Date.now();
            let deletedCount = 0;

            preloadCache.forEach((value, key) => {
                if (now - value.timestamp > CACHE_EXPIRE_TIME) {
                    // 直接删除缓存项，不再需要释放Blob URL
                    preloadCache.delete(key);
                    deletedCount++;
                }
            });

            if (deletedCount > 0) {
                console.log(`清理了 ${deletedCount} 个过期缓存项`);
            }
        }

        /**
         * 清理最旧的缓存项
         */
        function cleanupOldestCache() {
            if (preloadCache.size <= 0) return;

            let oldestKey = null;
            let oldestTime = Date.now();

            preloadCache.forEach((value, key) => {
                if (value.timestamp < oldestTime) {
                    oldestTime = value.timestamp;
                    oldestKey = key;
                }
            });

            if (oldestKey) {
                // 直接删除缓存项，不再需要释放Blob URL
                preloadCache.delete(oldestKey);
                console.log(`移除最旧的缓存项: ${oldestKey}`);
            }
        }

        /**
         * 预加载下一首歌曲
         */
        function preloadNextSongs() {
            if (!isOnline || isPreloading || !isInitialized || songIds.length === 0) {
                return;
            }

            // 计算需要预加载的歌曲数量
            const needPreloadCount = Math.min(maxPreloadCount, songIds.length - 1);

            // 清空当前预加载队列
            preloadQueue = [];

            // 根据播放模式计算下几首歌曲
            let nextSongIds = [];

            if (playMode === PlayMode.RANDOM) {
                // 随机模式
                for (let i = 1; i <= needPreloadCount; i++) {
                    const nextRandomIndex = (randomIndex + i) % randomQueue.length;
                    nextSongIds.push(randomQueue[nextRandomIndex]);
                }
            } else {
                // 顺序或单曲循环模式
                for (let i = 1; i <= needPreloadCount; i++) {
                    const nextIndex = (currentIndex + i) % songIds.length;
                    nextSongIds.push(songIds[nextIndex]);
                }
            }

            // 添加到预加载队列
            nextSongIds.forEach(songId => {
                // 确保不会预加载当前正在播放的歌曲
                if (songId !== currentPlayingSongId) {
                    preloadQueue.push({ id: songId });
                }
            });

            // 开始处理预加载队列
            if (preloadQueue.length > 0 && !isPreloading) {
                processPreloadQueue();
            }
        }

        /**
         * 更新网络状态指示器
         */
        function updateNetworkIndicator() {
            // 根据网络状态和质量设置不同颜色
            if (!isOnline) {
                networkIndicator.style.backgroundColor = "#F44336"; // 红色 - 离线
            } else {
                switch (networkQuality) {
                    case 'excellent':
                        networkIndicator.style.backgroundColor = "#4CAF50"; // 绿色 - 优秀
                        break;
                    case 'good':
                        networkIndicator.style.backgroundColor = "#8BC34A"; // 浅绿色 - 良好
                        break;
                    case 'fair':
                        networkIndicator.style.backgroundColor = "#FFC107"; // 黄色 - 一般
                        break;
                    case 'poor':
                        networkIndicator.style.backgroundColor = "#FF9800"; // 橙色 - 较差
                        break;
                    default:
                        networkIndicator.style.backgroundColor = "#4CAF50"; // 默认绿色
                }
            }
        }

            EventListenerManager.add(document, 'touchend', () => {
                if (isDragging) progressBarTouchHandler.end();
            });

            // 音频事件监听
            player.addEventListener('loadedmetadata', () => {
                // 关键修复：原生播放器模式下跳过Web Audio的metadata事件
                if (USE_NATIVE_PLAYER && nativePlayerInitialized) return;
                
                totalDuration = Math.floor(player.duration * 1000);
                totalTimeDisplay.textContent = formatTime(totalDuration / 1000);
                forceSyncMediaSession();
            });

            player.addEventListener('timeupdate', () => {
                // 关键修复：原生播放器模式下跳过Web Audio的timeupdate事件
                if (USE_NATIVE_PLAYER && nativePlayerInitialized) return;
                
                // 记录真实timeupdate事件时间
                lastRealTimeUpdate = Date.now();

                if (!isDragging && !isLoading && isOnline) {
                    // 关键修改：直接使用音频元素的当前时间，而不是基于定时器的估计
                    currentProgress = Math.floor(player.currentTime * 1000);
                    updateProgress();
                    lastUpdateTime = Date.now();

                    if (currentProgress % 100 === 0) {
                        updateMediaSessionPosition();
                    }

                    if (lyricsEnabled) updateLyricsDisplay();
                    else lastKnownTime = currentProgress;
                }
            });

            player.addEventListener('ratechange', () => {
                // 关键修复：原生播放器模式下跳过Web Audio的ratechange事件
                if (USE_NATIVE_PLAYER && nativePlayerInitialized) return;
                
                if ('mediaSession' in navigator && !isLoading) {
                    navigator.mediaSession.setPositionState({
                        duration: totalDuration / 1000,
                        position: player.currentTime,
                        playbackRate: player.playbackRate || 1
                    });
                }
            });

            player.addEventListener('seeked', () => {
                // 关键修复：原生播放器模式下跳过Web Audio的seeked事件
                if (USE_NATIVE_PLAYER && nativePlayerInitialized) return;
                
                if (!isLoading) {
                    // 关键修改：直接使用音频元素的当前时间
                    currentProgress = Math.floor(player.currentTime * 1000);
                    updateProgress();
                    forceSyncMediaSession();
                    if (lyricsEnabled) updateLyricsDisplay();
                    
                    // UI指示器动画反馈
                    syncIndicator.classList.add('syncing');
                    setTimeout(() => syncIndicator.classList.remove('syncing'), 300);
                }
            });

            player.addEventListener('pause', () => {
                // 关键修复：原生播放器模式下跳过Web Audio的pause事件
                if (USE_NATIVE_PLAYER && nativePlayerInitialized) return;
                
                if (!isLoading) {
                    forceSyncMediaSession();
                }
            });

            player.addEventListener('error', (e) => {
                if (USE_NATIVE_PLAYER) {
                    console.log('原生播放器模式下，跳过Web Audio错误处理');
                    return;
                }
                
                if (!player.src || player.src === '' || player.src === window.location.href) {
                    return;
                }
                
                console.error('音频播放错误:', e);
                console.error('音频错误详情:', {
                    code: player.error?.code,
                    message: player.error?.message,
                    src: player.src,
                    networkState: player.networkState,
                    readyState: player.readyState,
                    userAgent: navigator.userAgent
                });
                
                // 移动端特殊错误处理
                handleMobileAudioError(e);
                
                // 如果正在使用缓存加载中，不处理（让playWithCachedData的错误处理器处理）
                if (isLoading) {
                    console.log('加载中出错，等待重试...');
                    return;
                }

                // 处理URL过期（403错误）
                if (player.error && (player.error.code === 2 || player.error.code === 4)) {
                    // 离线状态下不删除缓存，尝试播放下一首
                    if (!isOnline) {
                        console.log('离线状态，无法刷新缓存，尝试播放下一首');
                        setTimeout(() => playNextSong(), 1000);
                        return;
                    }

                    console.log('歌曲URL可能已过期，尝试重新加载...');
                    // 删除过期缓存
                    if (currentPlayingSongId) {
                        localStorage.removeItem(CACHE_CONFIG.SONG_CACHE_PREFIX + currentPlayingSongId);
                    }
                    // 重新加载当前歌曲（跳过缓存）
                    const targetIndex = playMode === PlayMode.RANDOM ? randomIndex : currentIndex;
                    setTimeout(() => {
                        loadAndPlaySong(targetIndex, 1, player.currentTime);
                    }, 500);
                    return;
                }

                if (isPlaying) {
                    setTimeout(() => {
                        if (player.error && player.error.code === 4) {
                            playNextSong();
                        } else {
                            player.play().catch(err => {
                                console.error('恢复播放失败:', err);
                                isPlaying = false;
                                forceSyncMediaSession();
                            });
                        }
                    }, 1000);
                }
            });

            // 歌曲播放结束处理（根据播放模式切换） - 关键修复点
            player.addEventListener('ended', () => {
                if (isLoading) return;

                // 防重复处理：1秒内不再处理第二次ended事件
                const now = Date.now();
                if (now - lastEndedTime < 1000) {
                    return;
                }
                lastEndedTime = now;

                cancelLyricRequest();
                clearLyricRetryTimeout();
                lyricRetryCount = 0;

                // 关键修复：在重置媒体会话之前，先强制同步进度条到完成状态
                if ('mediaSession' in navigator) {
                    try {
                        const safeDuration = totalDuration / 1000;
                        if (!isNaN(safeDuration) && safeDuration > 0) {
                            // 将进度条同步到歌曲结束位置
                            navigator.mediaSession.setPositionState({
                                duration: safeDuration,
                                position: safeDuration,
                                playbackRate: player.playbackRate || 1
                            });
                            navigator.mediaSession.playbackState = "paused";
                        }
                    } catch (error) {
                        console.error("同步进度条到完成状态失败:", error);
                    }
                }

                resetMediaSession();

                // 根据播放模式决定下一步操作
                switch (playMode) {
                    case PlayMode.SINGLE_LOOP:
                        // 单曲循环：重新播放当前歌曲
                        player.currentTime = 0;
                        player.play().catch(err => {
                            console.error('单曲循环播放失败:', err);
                        });
                        break;
                    case PlayMode.RANDOM:
                        // 随机播放：从随机队列取下一首
                        playNextRandomSong();
                        break;
                    default: // 顺序播放
                        playNextSong();
                        break;
                }
            });

            // 移动端：点击hezi唤出控件（使用 EventListenerManager 管理）
            const hezi = document.getElementById('hezi');
            EventListenerManager.add(hezi, 'click', (e) => {
                const isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    // 检查控件是否已显示（opacity是否为1）
                    const isVisible = kong.style.opacity === '1';
                    // 如果控件未显示，唤出控件
                    if (!isVisible) {
                        e.stopPropagation();
                        showControls();
                        startHideTimer();
                    } else {
                        // 关键修复：控件已显示时，点击hezi也重启计时器
                        // 这样用户有3秒时间可以操作控件
                        e.stopPropagation();
                        startHideTimer();
                    }
                }
            });

            // 控件内部点击时阻止冒泡到hezi，并重启计时器（使用 EventListenerManager 管理）
            EventListenerManager.add(kong, 'click', (e) => {
                const isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    e.stopPropagation();
                    startHideTimer();
                }
            });

            // 键盘控制事件监听
            document.addEventListener('keydown', function (event) {
                // 空格键播放/暂停
                if (event.code === 'Space' || event.key === ' ') {
                    handlePlayPause();
                }
                // 左箭头键播放上一首
                else if (event.code === 'ArrowLeft' || event.key === 'ArrowLeft') {
                    playPreviousSong();
                }
                // 右箭头键播放下一首
                else if (event.code === 'ArrowRight' || event.key === 'ArrowRight') {
                    playNextSong();
                }
                // 上箭头键开关歌词
                else if (event.code === 'ArrowUp' || event.key === 'ArrowUp') {
                    toggleLyrics();
                }
                // 下箭头键切换播放模式
                else if (event.code === 'ArrowDown' || event.key === 'ArrowDown') {
                    togglePlayMode();
                }
            });
        }

        // 控制器显示/隐藏逻辑（全局作用域）
        let controlHideTimer = null;
        const CONTROL_HIDE_DELAY = 3000; // 3秒后隐藏

        function showControls() {
            const kong = document.getElementById('kongzhiqi');
            kong.style.opacity = '1';
            // 清除之前的计时器
            if (controlHideTimer) {
                clearTimeout(controlHideTimer);
                controlHideTimer = null;
            }
        }

        function hideControls() {
            const kong = document.getElementById('kongzhiqi');
            // 移动端且正在播放时才自动隐藏
            const isMobile = window.innerWidth <= 768;
            if (isMobile && isPlaying) {
                kong.style.opacity = '0';
            }
        }

        function startHideTimer() {
            // 关键修复：只在移动端启动隐藏计时器
            const isMobile = window.innerWidth <= 768;
            if (!isMobile) return;
            
            // 清除之前的计时器
            if (controlHideTimer) {
                clearTimeout(controlHideTimer);
            }
            // 启动新的计时器
            controlHideTimer = setTimeout(() => {
                hideControls();
            }, CONTROL_HIDE_DELAY);
        }

        // 桌面端：鼠标悬停效果
        kong.addEventListener('mouseenter', () => {
            const isMobile = window.innerWidth <= 768;
            if (!isMobile) {
                showControls();
            }
        });

        kong.addEventListener('mouseleave', () => {
            const isMobile = window.innerWidth <= 768;
            if (!isMobile) {
                kong.style.opacity = '0';
            }
        });


        /**
         * 初始化浏览器媒体会话事件
         */
        function initMediaSessionEvents() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('seekto', (details) => {
                    if (isLoading) return;

                    syncIndicator.classList.add('syncing');
                    const seekTimeMs = Math.floor(details.seekTime * 1000);
                    const clampedTimeMs = Math.max(0, Math.min(seekTimeMs, totalDuration));

                    // 关键修复：根据播放器类型选择正确的跳转方式
                    if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                        // 原生播放器模式下使用 nativeSeekTo
                        nativeSeekTo(clampedTimeMs);
                    } else {
                        // Web Audio 模式下使用 player.currentTime
                        if (details.fastSeek && player.fastSeek) {
                            player.fastSeek(clampedTimeMs / 1000);
                        } else {
                            player.currentTime = clampedTimeMs / 1000;
                        }
                    }

                    currentProgress = clampedTimeMs;
                    updateProgress();
                    forceSyncMediaSession();
                    if (lyricsEnabled) updateLyricsDisplay();

                    setTimeout(() => syncIndicator.classList.remove('syncing'), 300);
                });

                navigator.mediaSession.setActionHandler('seekforward', (details) => {
                    if (!isLoading) handleSystemSeek(details.seekOffset || 10);
                });

                navigator.mediaSession.setActionHandler('seekbackward', (details) => {
                    if (!isLoading) handleSystemSeek(-(details.seekOffset || 10));
                });

                navigator.mediaSession.setActionHandler('play', () => {
                    // 关键修复：根据播放器类型判断播放状态
                    const isPlayerPaused = USE_NATIVE_PLAYER && nativePlayerInitialized
                        ? !isPlaying
                        : player.paused;
                    if (isPlayerPaused && !isLoading && isOnline) handlePlayPause();
                });

                navigator.mediaSession.setActionHandler('pause', () => {
                    // 关键修复：根据播放器类型判断播放状态
                    const isPlayerPlaying = USE_NATIVE_PLAYER && nativePlayerInitialized
                        ? isPlaying
                        : !player.paused;
                    if (isPlayerPlaying && !isLoading && isOnline) handlePlayPause();
                });

                navigator.mediaSession.setActionHandler('previoustrack', () => {
                    if (!isLoading) playPreviousSong();
                });

                navigator.mediaSession.setActionHandler('nexttrack', () => {
                    if (!isLoading) playNextSong();
                });
            }
        }

        /**
         * 处理系统快进/快退操作
         */
        function handleSystemSeek(offsetSeconds) {
            if (isLoading || totalDuration === 0) return;

            syncIndicator.classList.add('syncing');
            const offsetMs = Math.floor(offsetSeconds * 1000);
            const newTimeMs = Math.max(0, Math.min(currentProgress + offsetMs, totalDuration));

            // 关键修复：根据播放器类型选择正确的跳转方式
            if (USE_NATIVE_PLAYER && nativePlayerInitialized) {
                // 原生播放器模式下使用 nativeSeekTo
                nativeSeekTo(newTimeMs);
            } else {
                // Web Audio 模式下使用 player.currentTime
                player.currentTime = newTimeMs / 1000;
            }
            
            currentProgress = newTimeMs;
            updateProgress();
            forceSyncMediaSession();
            updateLyricsDisplay();

            setTimeout(() => syncIndicator.classList.remove('syncing'), 300);
        }

        /**
         * 通知原生端歌曲信息变化
         * 用于更新系统通知栏的歌曲信息
         */
        function notifyNativeSongInfo() {
            if (window.AndroidBridge && typeof window.AndroidBridge.onSongInfoChanged === 'function') {
                const songInfo = {
                    id: currentPlayingSongId || "",
                    title: songTitle.textContent || "",
                    artist: songArtist.textContent || "",
                    cover: currentCoverImage || "",
                    duration: totalDuration
                };
                window.AndroidBridge.onSongInfoChanged(JSON.stringify(songInfo));
                console.log("已通知原生端歌曲信息:", songInfo);
            }

        /**
         * 更新系统通知栏状态
         * @param {string} status 状态：loading（加载中）、playing（播放中）、paused（暂停）
         * @param {string} songName 歌曲名称
         * @param {string} artistName 歌手名称
         */
        function updateNotificationStatus(status, songName, artistName) {
            if (window.AndroidBridge && typeof window.AndroidBridge.updateNotificationStatus === 'function') {
                window.AndroidBridge.updateNotificationStatus(status, songName, artistName);
                console.log("已更新通知栏状态:", status, songName, artistName);
            }
        }

        /**
         * 移动端音频错误处理
         * 专门处理手机上的音频播放问题
         */
        function handleMobileAudioError(error) {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (!isMobile) {
                return; // 非移动端不处理
            }
            
            console.log('移动端音频错误处理开始');
            
            // 检查错误类型并采取相应措施
            if (player.error) {
                switch (player.error.code) {
                    case 1: // MEDIA_ERR_ABORTED - 用户中止
                        console.log('用户中止播放，忽略错误');
                        break;
                        
                    case 2: // MEDIA_ERR_NETWORK - 网络错误
                        console.log('网络错误，尝试使用备用方案');
                        handleNetworkError();
                        break;
                        
                    case 3: // MEDIA_ERR_DECODE - 解码错误
                        console.log('音频解码错误，尝试重新加载或使用原生播放器');
                        handleDecodeError();
                        break;
                        
                    case 4: // MEDIA_ERR_SRC_NOT_SUPPORTED - 格式不支持
                        console.log('音频格式不支持，尝试转换格式');
                        handleFormatError();
                        break;
                        
                    default:
                        console.log('未知音频错误，尝试通用恢复方案');
                        handleGenericError();
                        break;
                }
            }
        }

        /**
         * 处理网络错误
         */
        function handleNetworkError() {
            // 移动端网络优化：降低音质或使用缓存
            if (isOnline) {
                console.log('移动端网络错误，尝试使用低音质版本');
                
                // 尝试切换到低音质URL
                const lowQualityUrl = getLowQualityAudioUrl(currentPlayingSongId);
                if (lowQualityUrl) {
                    player.src = lowQualityUrl;
                    player.load();
                    setTimeout(() => {
                        player.play().catch(err => {
                            console.error('低音质版本播放失败:', err);
                            // 最终回退到缓存
                            handleCacheFallback();
                        });
                    }, 1000);
                } else {
                    handleCacheFallback();
                }
            } else {
                handleCacheFallback();
            }
        }

        /**
         * 处理解码错误
         */
        function handleDecodeError() {
            // 尝试使用原生播放器
            if (USE_NATIVE_PLAYER && window.AndroidBridge) {
                console.log('Web Audio解码失败，切换到原生播放器');
                if (currentPlayingSongId && player.src) {
                    const currentSrc = player.src;
                    player.pause();
                    player.src = '';
                    const nativeResult = nativeLoadAndPlay(currentSrc, 0);
                    if (nativeResult) {
                        isUsingNativePlayer = true;
                        return;

        /**
         * 移动端自动播放策略优化
         * 处理移动端浏览器的自动播放限制
         */
        function optimizeMobilePlayback() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (!isMobile) {
                return;
            }
            
            if (typeof USE_NATIVE_PLAYER !== 'undefined' && USE_NATIVE_PLAYER) {
                console.log('原生播放器模式：跳过移动端自动播放限制');
                player.preload = 'metadata';
                return;
            }
            
            console.log('移动端播放优化启动');
            
            let userInteracted = false;
            
            const handleUserInteraction = () => {
                if (!userInteracted) {
                    userInteracted = true;
                    console.log('用户已交互，允许自动播放');
                    
                    document.removeEventListener('click', handleUserInteraction);
                    document.removeEventListener('touchstart', handleUserInteraction);
                    document.removeEventListener('keydown', handleUserInteraction);
                }
            };
            
            document.addEventListener('click', handleUserInteraction);
            document.addEventListener('touchstart', handleUserInteraction);
            document.addEventListener('keydown', handleUserInteraction);
            
            const originalPlayFunction = player.play;
            player.play = function() {
                if (!userInteracted) {
                    console.log('移动端：等待用户交互后才能播放');
                    
                    return new Promise((resolve, reject) => {
                        const checkInteraction = () => {
                            if (userInteracted) {
                                console.log('用户已交互，开始播放');
                                originalPlayFunction.call(player).then(resolve).catch(reject);
                            } else {
                                setTimeout(checkInteraction, 500);
                            }
                        };
                        checkInteraction();
                    });
                }
                
                return originalPlayFunction.call(player);
            };
            
            if (player.buffered && player.buffered.length > 0) {
                console.log('移动端：优化缓冲策略');
                player.preload = 'metadata';
            }
            
            // 移动端音频格式偏好设置
            console.log('移动端：设置音频格式偏好');
            
            // 添加移动端特定的错误恢复策略
            const originalErrorHandler = player.onerror;
            player.onerror = function(e) {
                console.log('移动端错误处理器被调用');
                
                // 先调用原始错误处理器
                if (originalErrorHandler) {
                    originalErrorHandler.call(player, e);
                }
                
                // 移动端特定的错误恢复
                handleMobileSpecificError(e);
            };
        }

                () => {
                    console.log('策略1：重置播放器');
                    player.pause();
                    player.currentTime = 0;
                    player.load();
                },
                
                // 策略2：延迟重试
                () => {
                    console.log('策略2：延迟重试');
                    return new Promise(resolve => {
                        setTimeout(() => {
                            player.load();
                            resolve();
                        }, 2000);
                    });
                },
                
                // 策略3：切换音频源
                () => {
                    console.log('策略3：切换音频源');
                    if (currentPlayingSongId) {
                        const cachedData = getSongCacheFromStorage(currentPlayingSongId);
                        if (cachedData) {
                            if (USE_NATIVE_PLAYER && window.AndroidBridge && typeof window.AndroidBridge.nativeLoadAndPlay === 'function') {
                                player.pause();

                                const result = window.AndroidBridge.nativeLoadAndPlay(cachedData.url, 0);
                                if (!result) {
